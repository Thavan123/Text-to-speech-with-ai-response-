<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thavan AI - PDF & Q&A Formatter</title>
  <!-- PDF.js សម្រាប់អានហ្វាល់ PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <!-- Tesseract.js សម្រាប់អានរូបភាព OCR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.0.2/tesseract.min.js"></script>
  <style>
    :root {
      --primary: #7c3aed;
      --accent: #00d2ff;
      --bg-dark: #0f0c29;
      --card-bg: rgba(37, 37, 56, 0.95);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-top: 0;
      font-size: 19px;
      margin-bottom: 15px;
    }

    /* ប្រអប់សម្រាប់ដាក់ API Key */
    .api-box {
      background: rgba(26, 26, 46, 0.8);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .api-box label {
      font-size: 12px;
      color: #00d2ff;
      display: block;
      margin-bottom: 5px;
    }
    .api-row {
      display: flex;
      gap: 8px;
    }
    .api-row input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15, 12, 41, 0.9);
      color: #fff;
      font-size: 13px;
    }
    .api-row button {
      padding: 8px 12px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }

    .upload-box {
      border: 2px dashed rgba(0, 210, 255, 0.4);
      padding: 15px;
      text-align: center;
      border-radius: 12px;
      background: rgba(26, 26, 46, 0.6);
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-box:hover {
      border-color: var(--accent);
    }
    input[type="file"] {
      display: none;
    }
    .upload-label {
      cursor: pointer;
      font-size: 14px;
      color: #ddd;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26, 26, 46, 0.9);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    .btn-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    button.action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button.action-btn:active {
      transform: scale(0.97);
    }
    .btn-ai { background: #0284c7; }
    .btn-copy { background: #16a34a; }
    .btn-clear { background: #64748b; width: 100%; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 10px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📄 កែសម្រួល និងរៀបចំសំណួរ-ចម្លើយ</h2>

  <!-- ប្រអប់បញ្ចូល API Key -->
  <div class="api-box">
    <label for="apiKeyInput">🔑 បញ្ចូល Groq API Key របស់អ្នកទីនេះ៖</label>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="gsk_...">
      <button onclick="saveApiKey()">រក្សាទុក</button>
    </div>
  </div>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="upload-label">
      📁 <b>ចុចទីនេះដើម្បីជ្រើសរើសហ្វាល់ PDF ឬរូបភាព</b><br>
      <span style="font-size: 12px; color: #aaa;">(កម្មវិធីនឹងទាញយក និងតម្រៀបលេខរៀងជូនស្វ័យប្រវត្ត)</span>
    </div>
    <input type="file" id="fileInput" accept=".pdf,image/*" onchange="handleFile(this)">
  </div>

  <div id="status">កំពុងដំណើរការ...</div>
  
  <textarea id="resultText" placeholder="លទ្ធផលអត្ថបទដែលបានរៀបចំរួចនឹងបង្ហាញទីនេះ..."></textarea>

  <div class="btn-grid">
    <button class="action-btn btn-ai" onclick="formatWithAI()">✨ តម្រៀបសំណួរដោយ AI</button>
    <button class="action-btn btn-copy" onclick="copyText()">📋 ចម្លងអត្ថបទ</button>
  </div>
  <button class="action-btn btn-clear" onclick="clearAll()">🗑️ សម្អាតទិន្នន័យ</button>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  // ផ្ទុក API Key ដែលធ្លាប់រក្សាទុកក្នុងเครื่อง (LocalStorage) មកដាក់ក្នុងប្រអប់ស្រាប់
  window.onload = function() {
    const savedKey = localStorage.getItem('groq_api_key');
    if (savedKey) {
      document.getElementById('apiKeyInput').value = savedKey;
    }
  };

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key.startsWith('gsk_')) {
      alert('⚠️ API Key មិនត្រឹមត្រូវទេ! (វាត្រូវផ្ដើមដោយ gsk_...)');
      return;
    }
    localStorage.setItem('groq_api_key', key);
    alert('✅ បានរក្សាទុក API Key ជោគជ័យ!');
  }

  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() {
    document.getElementById('status').style.display = 'none';
  }

  async function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('resultText').value = '';

    if (file.type === "application/pdf") {
      showStatus("📖 កំពុងអានហ្វាល់ PDF...");
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          showStatus(`📖 កំពុងអានទំព័រទី ${i} នៃ ${pdf.numPages}...`);
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(" ");
          fullText += pageText + "\n";
        }

        document.getElementById('resultText').value = fullText.trim();
        hideStatus();
        formatWithAI();
      } catch (err) {
        hideStatus();
        alert("មានបញ្ហាក្នុងការអាន PDF: " + err.message);
      }
    } 
    else if (file.type.startsWith("image/")) {
      showStatus("🔍 កំពុងទាញយកអក្សរពីរូបភាព (OCR)...");
      Tesseract.recognize(
        file,
        'eng+khm',
        { 
          logger: m => {
            if (m.status === 'recognizing text') {
              showStatus(`🔍 កំពុងអាន: ${Math.round(m.progress * 100)}%`);
            }
          } 
        }
      ).then(({ data: { text } }) => {
        document.getElementById('resultText').value = text;
        hideStatus();
        formatWithAI();
      }).catch(err => {
        hideStatus();
        alert("មានបញ្ហាក្នុងការអានរូបភាព: " + err.message);
      });
    } else {
      alert("សូមជ្រើសរើសយករូបភាព ឬហ្វាល់ PDF ជាមុនសិន!");
    }
  }

  async function formatWithAI() {
    const apiKey = localStorage.getItem('groq_api_key') || document.getElementById('apiKeyInput').value.trim();
    if (!apiKey) {
      alert("⚠️ សូមបញ្ចូល និងរក្សាទុក Groq API Key ជាមុនសិន!");
      return;
    }

    const rawText = document.getElementById('resultText').value.trim();
    if (!rawText) {
      alert("គ្មានអត្ថបទសម្រាប់កែសម្រួលទេ!");
      return;
    }

    showStatus("🤖 AI កំពុងកែសម្រួល និងតម្រៀបសំណួរ-ចម្លើយ...");

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { 
          "Authorization": "Bearer " + apiKey, 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { 
              role: "system", 
              content: "អ្នកគឺជាជំនួយការផ្នែកកែសម្រួលអត្ថបទវេជ្ជសាស្ត្រ។ សូមជួយរៀបចំ និងតម្រៀបអត្ថបទសំណួរ និងចម្លើយខាងក្រោមឱ្យបានត្រឹមត្រូវតាមលំដាប់លំដោយលេខរៀងពី ១ រហូតដល់ចប់ ដោយកែតម្រូវអក្ខរាវិរុទ្ធដែលរាយប៉ាយឱ្យបានស្អាត និងងាយស្រួលអានបំផុត។" 
            },
            { role: "user", content: rawText }
          ],
          temperature: 0.3
        })
      });

      const data = await res.json();
      hideStatus();

      if (data.choices && data.choices[0]) {
        const formatted = data.choices[0].message.content.trim();
        document.getElementById('resultText').value = formatted;
      } else {
        alert("Error: " + (data.error?.message || "API Key មិនត្រឹមត្រូវ ឬអស់កូតាប្រើប្រាស់"));
      }
    } catch(e) {
      hideStatus();
      alert("Network Error: " + e.message);
    }
  }

  function copyText() {
    const text = document.getElementById('resultText');
    if (!text.value) {
      alert("គ្មានអត្ថបទសម្រាប់ចម្លងទេ!");
      return;
    }
    text.select();
    text.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(text.value).then(() => {
      alert("✅ បានចម្លងអត្ថបទជោគជ័យ!");
    });
  }

  function clearAll() {
    document.getElementById('fileInput').value = '';
    document.getElementById('resultText').value = '';
    hideStatus();
  }
</script>
</body>
</html>
