<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khuon Thavan - File to Text Extractor</title>
  <!-- ប្រើប្រាស់ Tesseract.js សម្រាប់ទាញយកអត្ថបទពីរូបភាព -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.0.2/tesseract.min.js"></script>
  <style>
    :root {
      --primary: #7c3aed;
      --accent: #00d2ff;
      --bg-dark: #0f0c29;
      --card-bg: rgba(37, 37, 56, 0.95);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .upload-box {
      border: 2px dashed rgba(0, 210, 255, 0.4);
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      background: rgba(26, 26, 46, 0.6);
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-box:hover {
      border-color: var(--accent);
    }
    input[type="file"] {
      display: none;
    }
    .upload-label {
      cursor: pointer;
      font-size: 14px;
      color: #ddd;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26, 26, 46, 0.9);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    .btn-grid {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button:active {
      transform: scale(0.97);
    }
    .btn-copy { background: #16a34a; }
    .btn-clear { background: #64748b; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📂 បម្លែងឯកសារជាអត្ថបទ (Text Extractor)</h2>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="upload-label">
      📁 <b>ចុចទីនេះដើម្បីជ្រើសរើសហ្វាល់</b><br>
      <span style="font-size: 12px; color: #aaa;">(គាំទ្ររូបភាព PNG, JPG ឬឯកសារអត្ថបទ)</span>
    </div>
    <input type="file" id="fileInput" accept="image/*,.txt" onchange="handleFile(this)">
  </div>

  <div id="status">កំពុងអានអត្ថបទ... សូមរង់ចាំបន្តិច</div>
  
  <textarea id="resultText" placeholder="អត្ថបទដែលទាញយកបាននឹងបង្ហាញទីនេះ..."></textarea>

  <div class="btn-grid">
    <button class="btn-copy" onclick="copyText()">📋 ចម្លងអត្ថបទ (Copy)</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ សម្អាត</button>
</div>
</div>

<script>
  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() {
    document.getElementById('status').style.display = 'none';
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    showStatus("📂 កំពុងដំណើរការហ្វាល់...");

    // ប្រសិនបើជា Text File (.txt)
    if (file.type === "text/plain") {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('resultText').value = e.target.result;
        hideStatus();
      };
      reader.readAsText(file, "UTF-8");
    } 
    // ប្រសិនបើជារូបភាព (PNG, JPG) ប្រើ OCR ដើម្បីទាញយកអក្សរ
    else if (file.type.startsWith("image/")) {
      showStatus("🔍 កំពុងទាញយកអក្សរពីរូបភាព (OCR)...");
      Tesseract.recognize(
        file,
        'eng+khm', // គាំទ្រភាសាអង់គ្លេស និងខ្មែរ
        { 
          logger: m => {
            if (m.status === 'recognizing text') {
              showStatus(`🔍 កំពុងអាន: ${Math.round(m.progress * 100)}%`);
            }
          } 
        }
      ).then(({ data: { text } }) => {
        document.getElementById('resultText').value = text;
        hideStatus();
      }).catch(err => {
        hideStatus();
        alert("មានបញ្កាក្នុងการអានរូបភាព: " + err);
      });
    } else {
      hideStatus();
      alert("សូមជ្រើសរើសយករូបភាព ឬឯកសារ .txt ជាមុនសិន!");
    }
  }

  function copyText() {
    const text = document.getElementById('resultText');
    if (!text.value) {
      alert("គ្មានអត្ថបទសម្រាប់ចម្លងទេ!");
      return;
    }
    text.select();
    text.setSelectionRange(0, 99999); // សម្រាប់ទូរស័ព្ទដៃ
    navigator.clipboard.writeText(text.value).then(() => {
      alert("✅ បានចម្លងអត្ថបទជោគជ័យ!");
    });
  }

  function clearAll() {
    document.getElementById('fileInput').value = '';
    document.getElementById('resultText').value = '';
    hideStatus();
  }
</script>
</body>
</html>
