<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">

  <style>

    #statusBox {
      display: none;

    /* Styles សម្រាប់ Pop-up ស្វាគមន៍ */

    .modal-content {
      background: #1e293b;

      border-radius: 16px;
      text-align: center;
      max-width: 350px;

    <p style="font-size: 0.8em; color: #94a3b8;">ប្រព័ន្ធ AI Assistant, បកប្រែ & កម្មវិធីអានអត្ថបទ</p>

<div class="container">

  <!-- ប្រអប់ទី ១ (ខាងលើ) សម្រាប់អ្នកប្រើប្រាស់ -->

  <textarea id="inputText" placeholder="វាយអក្សរ ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <!-- ប្រអប់ទី ២ (ខាងក្រោម) សម្រាប់ AI ឬ ការបកប្រែ -->
  <div class="box-label">
    <span>🤖 ចម្លើយ AI / លទ្ធផលបកប្រែ៖</span>
  </div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលឆ្លើយតប ឬបកប្រែនឹងបង្ហាញនៅទីនេះ..."></textarea>

  <!-- ប៊ូតុងបញ្ជា -->

    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    <button class="btn-music" onclick="generateSunoMusic()">🎵 តែងចម្រៀង</button>

<script>
// API Key ត្រូវបានភ្ជាប់រួចស្រេច (គ្មានការលោត Alert ស្ទះទៀតទេ)
const SYSTEM_GROQ_API_KEY = "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"; 

const bgMusic = document.getElementById('bgMusic');

function getGroqApiKey() {
  return SYSTEM_GROQ_API_KEY.trim();
}

function startApp() {
  document.getElementById('welcomeModal').style.display = 'none';
  if (bgMusic) {
    bgMusic.volume = 0.2;
    bgMusic.play().catch(err => console.log("Audio play blocked"));

    setTimeout(() => {
      let fadeInterval = setInterval(() => {
        if (bgMusic.volume > 0.02) {
          bgMusic.volume -= 0.02;
        } else {
          bgMusic.pause();
          bgMusic.currentTime = 0;
          clearInterval(fadeInterval);
        }
      }, 200);
    }, 8000);
  }
}

function stopBgMusicImmediately() {
  if (bgMusic) {
    bgMusic.pause();
    bgMusic.currentTime = 0;
  }
}

let recognition = null;
let isListening = false;

document.addEventListener('DOMContentLoaded', () => {
  loadSongHistory();
  initSpeechRecognition();
});

// --- ១. មុខងារចាប់សំឡេង (Speech-to-Text) ---
function initSpeechRecognition() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() { 
      isListening = true; 
      stopBgMusicImmediately();
      showStatus("🎤 កំពុងស្ដាប់សំឡេងរបស់អ្នក..."); 
    };

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      document.getElementById('inputText').value = transcript;
      hideStatus();
      askAI(); 
    };

    recognition.onerror = function(event) { 
      hideStatus(); 
      console.error("Speech Error:", event.error);
      isListening = false; 
    };

    recognition.onend = function() { 
      isListening = false; 
    };
  }
}

function startVoiceInput() {
  if (!recognition) { 
    alert("Browser របស់អ្នកមិនគាំទ្រមុខងារចាប់សំឡេងទេ!"); 
    return; 
  }
  if (isListening) { 
    recognition.stop(); 
    return; 
  }
  recognition.lang = document.getElementById('srcLangSelect').value;
  stopAudio();
  recognition.start();
}

// --- ២. មុខងារសួរ AI ---
async function askAI() {
  const apiKey = getGroqApiKey();
  const promptText = document.getElementById('inputText').value.trim();
  const srcLang = document.getElementById('srcLangSelect').value;
  
  if (!promptText) { 
    alert("សូមបញ្ចូលសំណួរក្នុងប្រអប់ខាងលើជាមុនសិន!"); 
    return; 
  }
  
  stopAudio();
  showStatus("🤖 AI កំពុងគិត និងត្រៀមឆ្លើយតប...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.5,
        messages: [
          { role: "system", content: `You are a helpful AI voice assistant. Respond accurately and concisely in language code: ${srcLang}. Keep response short and clear.` }, 
          { role: "user", content: promptText }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0].message.content) {
      const aiReply = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = aiReply;
      hideStatus();
      speakText(aiReply, srcLang);

    } else if (data.error) {
      hideStatus();
      alert("Groq Error: " + data.error.message);
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហាភ្ជាប់ទៅ AI៖ " + error.message); 
  }
}

// --- ៣. មុខងារបកប្រែភាសា ---
async function translateText() {
  const apiKey = getGroqApiKey();
  const promptText = document.getElementById('inputText').value.trim();
  const targetLang = document.getElementById('targetLangSelect').value;
  
  if (!promptText) { 
    alert("សូមបញ្ចូលអត្ថបទក្នុងប្រអប់ខាងលើជាមុនសិន!"); 
    return; 
  }
  
  stopAudio();
  showStatus("🌐 AI កំពុងបកប្រែភាសា...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.3,
        messages: [
          { 
            role: "system", 
            content: `You are a professional translator. Translate the given text accurately into language code: ${targetLang}. Output ONLY the translated text without explanations or introductory words.` 
          }, 
          { role: "user", content: promptText }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0].message.content) {
      const translatedText = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = translatedText;
      hideStatus();
      speakText(translatedText, targetLang);

    } else if (data.error) {
      hideStatus();
      alert("Groq Error: " + data.error.message);
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហាក្នុងការបកប្រែ៖ " + error.message); 
  }
}

// --- ៤. មុខងារបំប្លែងអក្សរទៅជាសំឡេង ---
function speakText(text, langSelect) {
  stopAudio();
  stopBgMusicImmediately();

  const langCode = langSelect.split('-')[0];
  let voiceName = "Khmer Female"; 

  const voiceMap = {
    'en': 'US English Female',
    'fr': 'French Female',
    'zh': 'Chinese Female',
    'ja': 'Japanese Female',
    'ko': 'Korean Female',
    'th': 'Thai Female',
    'vi': 'Vietnamese Female',
    'de': 'Deutsch Female',
    'es': 'Spanish Female'
  };

  if (voiceMap[langCode]) {
    voiceName = voiceMap[langCode];
  }

  if (typeof responsiveVoice !== 'undefined') {
    responsiveVoice.speak(text, voiceName, { rate: 0.95, pitch: 1 });
  } else if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langSelect;
    window.speechSynthesis.speak(utterance);
  }
}

// --- ៥. មុខងារបង្កើតបទចម្រៀង ---
async function generateSunoMusic() {
  const apiKey = getGroqApiKey();
  const promptText = document.getElementById('inputText').value.trim();
  const lang = document.getElementById('srcLangSelect').value;
  
  if (!promptText) { 
    alert("សូមបញ្ចូលប្រធានបទចម្រៀងក្នុងប្រអប់ខាងលើ!"); 
    return; 
  }
  
  stopAudio();
  showStatus("🎵 AI កំពុងតែងបទចម្រៀង...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.7,
        messages: [
          { role: "system", content: `Write short catchy lyrics in language code: ${lang}. Output ONLY lyrics.` }, 
          { role: "user", content: promptText }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0].message.content) {
      const lyrics = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = lyrics;
      hideStatus();
      speakText(lyrics, lang);
      saveToHistory(promptText);

    } else if (data.error) {
      hideStatus();
      alert("Groq Error: " + data.error.message);
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហា៖ " + error.message); 
  }
}

// --- ៦. គ្រប់គ្រងប្រវត្តិ និង បញ្ជាសំឡេង ---
function saveToHistory(title) {
  let history = JSON.parse(localStorage.getItem('suno_song_history')) || [];
  history.unshift({ title: title || "បទចម្រៀង AI", date: new Date().toLocaleTimeString() });
  if (history.length > 15) history.pop();
  localStorage.setItem('suno_song_history', JSON.stringify(history));
  loadSongHistory();
}

function loadSongHistory() {
  const historyList = document.getElementById('historyList');
  if (!historyList) return;
  let history = JSON.parse(localStorage.getItem('suno_song_history')) || [];
  if (history.length === 0) { 
    historyList.innerHTML = '<p style="font-size: 0.8em; color: #888;">មិនទាន់មានប្រវត្តិ</p>'; 
    return; 
  }
  historyList.innerHTML = '';
  history.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `<span>🎵 ${item.title}</span>`;
    historyList.appendChild(div);
  });
}

function clearHistory() { 
  localStorage.removeItem('suno_song_history'); 
  loadSongHistory(); 
}

function playAudio() {
  const text = document.getElementById('outputText').value.trim() || document.getElementById('inputText').value.trim();
  const lang = document.getElementById('targetLangSelect').value;
  if (!text) {
    alert("មិនមានអត្ថបទដើម្បីចាក់សំឡេងទេ!");
    return;
  }
  speakText(text, lang);
}

function stopAudio() { 
  stopBgMusicImmediately();
  if (typeof responsiveVoice !== 'undefined') {
    responsiveVoice.cancel();
  }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
}

function clearAll() { 
  stopAudio(); 
  document.getElementById('inputText').value = ''; 
  document.getElementById('outputText').value = ''; 
}

function showStatus(msg) { 
  const statusBox = document.getElementById('statusBox'); 
  if (statusBox) { 
    statusBox.style.display = 'block'; 
    document.getElementById('statusText').innerText = msg; 
  } 
}

function hideStatus() { 
  const statusBox = document.getElementById('statusBox'); 
  if (statusBox) statusBox.style.display = 'none'; 
}
</script>
</body>
