<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ & AI Assistant</title>
  
  <!-- ResponsiveVoice Library សម្រាប់ចាក់សំឡេង -->
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
  
  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }
    label {
      font-size: 0.9em;
      color: #94a3b8;
    }
    select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 1em;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 12px 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    .btn-ask { background-color: #0284c7; }
    .btn-voice { background-color: #d97706; }
    .btn-music { background-color: #9333ea; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; }
    button:active { transform: scale(0.96); }
    
    #statusBox {
      display: none;
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 15px;
    }
    .history-box {
      margin-top: 20px;
      border-top: 1px solid #334155;
      padding-top: 15px;
    }
    .history-item {
      background: #0f172a;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 6px;
      font-size: 0.85em;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 កម្មវិធីអានអត្ថបទ & AI Assistant</h2>

  <label for="langSelect">🔤 ជ្រើសរើសភាសា (Language):</label>
  <select id="langSelect">
    <option value="km-KH">KH ភាសាខ្មែរ (Khmer)</option>
    <option value="en-US">EN English</option>
    <option value="th-TH">TH ភាសាថៃ (Thai)</option>
  </select>

  <textarea id="textInput" placeholder="វាយអក្សរនៅទីនេះ ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div id="statusBox">
    <span id="statusText">...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askAI()">✨ សួរ AI</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    <button class="btn-music" onclick="generateSunoMusic()">🎵 តែងចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុប</button>
  </div>

  <div class="history-box">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span>📜 ប្រវត្តិបទចម្រៀង MP3</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; padding:0; cursor:pointer;">🗑️ លុបប្រវត្តិ</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
