<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ & AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #loginOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }
    .login-box {
      background: #1e1e2f; padding: 30px; border-radius: 12px;
      text-align: center; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-width: 350px; width: 90%;
    }
    .btn-google {
      background: #4285F4; color: white; border: none; padding: 12px 20px;
      border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1em;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; margin-top: 15px;
    }
    .user-profile {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; margin-bottom: 15px;
    }
    .history-section { margin-top: 20px; text-align: left; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.08); padding: 8px 12px; margin-top: 8px; border-radius: 5px; gap: 10px; }
    .history-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9em; }
    .btn-download { background-color: #27ae60; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
    .btn-play-hist { background-color: #2980b9; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
  </style>
</head>
<body>

  <!-- ផ្ទាំង Login -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>🔐 សូមចូលប្រើប្រាស់</h2>
      <p>សូមចុះឈ្មោះ ឬ Login ជាមួយ Google ដើម្បីប្រើប្រាស់កម្មវិធី</p>
      <button class="btn-google" type="button" id="btnGoogleLogin">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
        Sign in with Google
      </button>
    </div>
  </div>

  <div class="container" id="mainApp" style="display: none;">
    <!-- ព័ត៌មានអ្នកប្រើប្រាស់ -->
    <div class="user-profile">
      <div style="display: flex; align-items: center; gap: 10px;">
        <img id="userAvatar" src="" width="35" height="35" style="border-radius: 50%;">
        <div>
          <div id="userName" style="font-weight: bold; font-size: 0.9em; color: white;"></div>
          <div id="userEmail" style="font-size: 0.75em; color: #aaa;"></div>
        </div>
      </div>
      <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em;">ចាកចេញ</button>
    </div>

    <h2>🤖 កម្មវិធីអានអត្ថបទ & AI Assistant</h2>
    <p>បញ្ចូលអត្ថបទអាន និយាយសួរ ឬបង្កើតបទចម្រៀង</p>

    <!-- ជ្រើសរើសភាសា -->
    <div class="form-group">
      <label for="langSelect">🔤 ជ្រើសរើសភាសា (Language):</label>
      <select id="langSelect" style="width: 100%; padding: 10px; border-radius: 5px; margin-top: 5px;">
        <option value="km-KH" selected>🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en-US">🇬🇧 English (US)</option>
        <option value="th-TH">🇹🇭 ไทย (Thai)</option>
        <option value="zh-CN">🇨🇳 中文 (Chinese Mandarin)</option>
        <option value="vi-VN">🇻🇳 Tiếng Việt (Vietnamese)</option>
        <option value="fr-FR">🇫🇷 Français (French)</option>
        <option value="es-ES">🇪🇸 Español (Spanish)</option>
        <option value="ja-JP">🇯🇵 日本語 (Japanese)</option>
        <option value="ko-KR">🇰🇷 한국어 (Korean)</option>
      </select>
    </div>

    <!-- ប្រអប់បញ្ចូលអត្ថបទ -->
    <textarea id="textInput" placeholder="បញ្ចូលអត្ថបទ ឬ ប្រធានបទចម្រៀង..."></textarea>

    <!-- Status -->
    <div id="statusBox" style="display: none; margin-bottom: 10px; color: #f39c12; font-weight: bold;">
      <span id="statusText">កំពុងដំណើរការ...</span>
    </div>

    <!-- ប៊ូតុង -->
    <div class="button-group" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
      <button onclick="askAI()" style="flex: 1; background-color: #008cba; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">✨ សួរ AI</button>
      <button onclick="startVoiceInput()" style="flex: 1; background-color: #e67e22; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🎤 និយាយ</button>
      <button onclick="generateSunoMusic()" style="flex: 1; background-color: #9b59b6; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🎵 បង្កើតចម្រៀង</button>
    </div>

    <div class="button-group" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
      <button onclick="playAudio()" style="flex: 1; background-color: #4caf50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">▶️ ចាក់សំឡេង</button>
      <button onclick="stopAudio()" style="flex: 1; background-color: #f44336; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">⏹️ បញ្ចប់</button>
      <button onclick="clearAll()" style="flex: 1; background-color: #7f8c8d; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">🗑️ លុប</button>
    </div>

    <!-- Player -->
    <audio id="audioPlayer" controls style="display: none; width: 100%; margin-top: 15px;"></audio>
    <div id="downloadContainer" style="margin-top: 10px; display: none;">
      <a id="downloadBtn" href="#" target="_blank" download="song.mp3" class="btn-download">📥 ទាញយក MP3 (Download)</a>
    </div>

    <!-- ប្រវត្តិ -->
    <div class="history-section">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 1.05em; color: #3498db;">📜 ប្រវត្តិបទចម្រៀង MP3</h3>
        <button onclick="clearHistory()" style="background: transparent; color: #e74c3c; border: none; cursor: pointer; font-size: 0.8em;">🗑️ លុបប្រវត្តិ</button>
      </div>
      <div id="historyList">
        <p style="font-size: 0.85em; color: #888; margin-top: 5px;">មិនទាន់មានប្រវត្តិបទចម្រៀងនៅឡើយទេ</p>
      </div>
    </div>

  </div>

  <!-- Firebase Version 8.10.1 (Stable សម្រាប់ទូរស័ព្ទ) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="script.js"></script>
</body>
</html>
