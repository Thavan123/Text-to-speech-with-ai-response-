<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant & Custom Camera</title>

  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 15px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.3em;
    }
    .lang-container {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lang-box {
      flex: 1;
    }
    .lang-box label {
      display: block;
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 0.95em;
      font-family: inherit;
    }
    select {
      margin-bottom: 10px;
    }
    .box-label {
      font-size: 0.85em;
      color: #38bdf8;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
    }
    textarea {
      height: 90px;
      resize: vertical;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #outputText {
      background-color: #090d16;
      border-color: #0284c7;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 5px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.85em;
      transition: 0.2s;
      font-family: inherit;
      text-align: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
    .btn-ask { background-color: #0284c7; }
    .btn-translate { background-color: #2563eb; }
    .btn-voice { background-color: #d97706; }
    .btn-camera-open { background-color: #0d9488; }
    .btn-live { background-color: #e11d48; }
    .btn-music { background-color: #9333ea; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; grid-column: span 3; }
    button:active { transform: scale(0.96); }

    /* 📷 ម៉ូដាល់កាមេរ៉ាផ្ទាល់ក្នុងវេបសាយ */
    .camera-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .camera-box {
      width: 90%;
      max-width: 400px;
      background: #1e293b;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #38bdf8;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    video {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      background: #000;
      transform: scaleX(-1); /* បញ្ច្រាសកញ្ចក់មុខបន្តិចឱ្យស្រួលមើល */
    }
    canvas { display: none; }
    .camera-controls {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }
    .btn-capture {
      background: #22c55e;
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 1em;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-close-cam {
      background: #ef4444;
      color: white;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 1em;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #statusBox {
      display: none;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .preview-img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
      border: 1px solid #38bdf8;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>⚡ Groq AI Assistant & Live Cam</h2>

  <div class="lang-container">
    <div class="lang-box">
      <label for="srcLangSelect">🗣️ ភាសាអ្នកនិយាយ៖</label>
      <select id="srcLangSelect">
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en">🇺🇸 English (US)</option>
      </select>
    </div>
    <div class="lang-box">
      <label for="targetLangSelect">🌐 ភាសាបកប្រែទៅ៖</label>
      <select id="targetLangSelect">
        <option value="en">🇺🇸 English (US)</option>
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
      </select>
    </div>
  </div>

  <div class="box-label">✏️ អត្ថបទ ឬ រូបភាពថតពីកាមេរ៉ា៖</div>
  
  <!-- 📷 ប្រអប់បង្ហាញរូបភាពដែលថតបាន -->
  <img id="imagePreview" class="preview-img" alt="Captured Image Preview">
  
  <textarea id="inputText" placeholder="វាយអក្សរ, បើកកាមេរ៉ាថត ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div class="box-label">🤖 ចម្លើយ AI / លទ្ធផល៖</div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលឆ្លើយតបនឹងបង្ហាញនៅទីនេះ..."></textarea>

  <div id="statusBox"><span id="statusText">...</span></div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askGroqAI()">✨ សួរ AI</button>
    <button class="btn-translate" onclick="translateGroqText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    
    <!-- 📷 ប៊ូតុងបើកកាមេរ៉ាផ្ទាល់ក្នុងវេបសាយ -->
    <button class="btn-camera-open" onclick="openCameraModal()">📸 បើកកាមេរ៉ា</button>

    <button class="btn-live" id="liveBtn" onclick="toggleLiveChat()">🔴 និយាយផ្ទាល់</button>
    
    <button class="btn-music" onclick="generateGroqSong()">🎵 តែងចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
  </div>
</div>

<!-- 📷 ផ្ទាំងគំរបបង្ហាញកាមេរ៉ាផ្ទាល់ក្នុងវេបសាយ (Camera Modal) -->
<div id="cameraModal" class="camera-modal">
  <div class="camera-box">
    <h3 style="color: #38bdf8; margin-top: 0;">ថតរូបជាមួយ AI Camera</h3>
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="canvasElement"></canvas>
    <div class="camera-controls">
      <button class="btn-capture" onclick="capturePhoto()">📸 ថតរូបនេះ</button>
      <button class="btn-close-cam" onclick="closeCameraModal()">❌ បិទ</button>
    </div>
  </div>
</div>

<script>
  const encodedGroqKey = "Z3NrXzJsZmY0TXk5NjlGcUVnMzFiUGdrV0dkeWIzRllEZkt0bXhNelZKcFMyT2JMempqcHFZQzg=";
  function getGroqApiKey() { return atob(encodedGroqKey).trim(); }

  let recognition = null;
  let isListening = false;
  let isLiveMode = false;
  let audioPlayer = new Audio();
  let videoStream = null;

  document.addEventListener('DOMContentLoaded', () => {
    initSpeechRecognition();
  });

  // 📷 បើកកាមេរ៉ាផ្ទាល់ក្នុងវេបសាយ
  async function openCameraModal() {
    const modal = document.getElementById('cameraModal');
    const video = document.getElementById('videoElement');
    modal.style.display = 'flex';

    try {
      videoStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" }, 
        audio: false 
      });
      video.srcObject = videoStream;
    } catch (err) {
      alert("មិនអាចបើកកាមេរ៉ាបានទេ: " + err.message);
      modal.style.display = 'none';
    }
  }

  // ❌ បិទកាមេរ៉ា
  function closeCameraModal() {
    const modal = document.getElementById('cameraModal');
    modal.style.display = 'none';
    if (videoStream) {
      videoStream.getTracks().forEach(track => track.stop());
    }
  }

  // 📸 ថតរូបពី Video Stream ដាក់ចូលវេបសាយ
  function capturePhoto() {
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const context = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageUrl = canvas.toDataURL('image/png');
    const preview = document.getElementById('imagePreview');
    preview.src = imageUrl;
    preview.style.display = 'block';

    document.getElementById('inputText').value = "សូមជួយពិនិត្យ និងពន្យល់រូបភាពដែលខ្ញុំបានថតនេះឱ្យបានច្បាស់លាស់។";
    
    closeCameraModal();
    askGroqAI(); // ថតរួចបញ្ជូនទៅ AI ស្វ័យប្រវត្តិភ្លាម
  }

  function initSpeechRecognition() {
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = function() { isListening = true; showStatus("🎤 កំពុងស្ដាប់សំឡេង..."); };
      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById('inputText').value = transcript;
        hideStatus();
        if (isLiveMode) { askGroqAI(); }
      };
      recognition.onerror = function() { hideStatus(); isListening = false; };
      recognition.onend = function() {
        isListening = false;
        if (isLiveMode) { setTimeout(() => { recognition.start(); }, 500); }
      };
    }
  }

  function startVoiceInput() {
    if (!recognition) { alert("Browser មិនគាំទ្រសំឡេងទេ!"); return; }
    isLiveMode = false;
    document.getElementById('liveBtn').style.backgroundColor = '#e11d48';
    if (isListening) { recognition.stop(); return; }
    recognition.lang = 'km-KH';
    stopAudio();
    recognition.start();
  }

  function toggleLiveChat() {
    if (!recognition) { alert("Browser មិនគាំទ្រទេ!"); return; }
    isLiveMode = !isLiveMode;
    const btn = document.getElementById('liveBtn');
    if (isLiveMode) {
      btn.style.backgroundColor = '#16a34a';
      showStatus("🔴 កំពុងឡាយផ្ទាល់ជាមួយ AI...");
      recognition.lang = 'km-KH';
      recognition.start();
    } else {
      btn.style.backgroundColor = '#e11d48';
      hideStatus();
      recognition.stop();
    }
  }

  async function askGroqAI() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim() || "សូមជួយពន្យល់។";
    showStatus("⚡ AI កំពុងវិភាគ...");

    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: "អ្នកគឺជាជំនួយការ AI ដ៏ឈ្លាសវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យបានច្បាស់លាស់។" },
            { role: "user", content: promptText }
          ],
          temperature: 0.7
        })
      });
      const data = await response.json();
      if (data.choices) {
        const aiReply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = aiReply;
        hideStatus();
        speakText(aiReply, 'km');
      }
    } catch (error) { hideStatus(); alert("Error: " + error.message); }
  }

  async function translateGroqText() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    if (!promptText) { alert("សូមបញ្ចូលអត្ថបទ!"); return; }
    showStatus("🌐 កំពុងបកប្រែ...");
    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: "Translate accurately into English. Return ONLY translated text." },
            { role: "user", content: promptText }
          ],
          temperature: 0.3
        })
      });
      const data = await response.json();
      if (data.choices) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
        hideStatus();
        speakText(translated, 'en');
      }
    } catch (error) { hideStatus(); alert("Error: " + error.message); }
  }

  function speakText(text, langCode) {
    stopAudio();
    if (!text) return;
    const cleanText = encodeURIComponent(text.substring(0, 300));
    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${cleanText}&tl=${langCode}&client=tw-ob`;
    audioPlayer.src = ttsUrl;
    audioPlayer.play().catch(() => {});
  }

  function stopAudio() {
    if (audioPlayer) { audioPlayer.pause(); audioPlayer.currentTime = 0; }
  }

  function clearAll() {
    stopAudio();
    isLiveMode = false;
    document.getElementById('liveBtn').style.backgroundColor = '#e11d48';
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('imagePreview').style.display = 'none';
  }

  function showStatus(msg) { document.getElementById('statusBox').style.display = 'block'; document.getElementById('statusText').innerText = msg; }
  function hideStatus() { document.getElementById('statusBox').style.display = 'none'; }
</script>
</body>
                                                                       </html>
