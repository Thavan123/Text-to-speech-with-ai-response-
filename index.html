<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khuon Thavan - Simple AI Assistant</title>
  <style>
    :root {
      --primary: #7c3aed;
      --accent: #00d2ff;
      --bg-dark: #0f0c29;
      --card-bg: rgba(37, 37, 56, 0.95);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .lang-selects {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lang-group {
      flex: 1;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #aaa;
    }
    select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26, 26, 46, 0.9);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    textarea {
      height: 90px;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button:active {
      transform: scale(0.97);
    }
    .btn-ask { background: #0284c7; }
    .btn-trans { background: #0ea5e9; }
    .btn-voice { background: #16a34a; }
    .btn-clear { background: #64748b; width: 100%; margin-top: 5px; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 Thavan AI Assistant</h2>

  <div class="lang-selects">
    <div class="lang-group">
      <label>🗣️ ភាសាប្រភព</label>
      <select id="srcLang">
        <option value="km">ភាសាខ្មែរ (Khmer)</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="zh">中文</option>
        <option value="th">ไทย</option>
      </select>
    </div>
    <div class="lang-group">
      <label>🌐 ភាសាបកប្រែ/គោលដៅ</label>
      <select id="targetLang">
        <option value="en">English</option>
        <option value="km">ភាសាខ្មែរ (Khmer)</option>
        <option value="fr">Français</option>
        <option value="zh">中文</option>
        <option value="th">ไทย</option>
      </select>
    </div>
  </div>

  <div id="status">កំពុងដំណើរការ...</div>
  
  <textarea id="inputText" placeholder="វាយអក្សរទីនេះ ដើម្បីសួរ AI ឬបកប្រែ..."></textarea>
  <textarea id="outputText" readonly placeholder="លទ្ធផលចម្លើយ AI..."></textarea>

  <div class="btn-grid">
    <button class="btn-ask" onclick="askAI()">✨ សួរ AI</button>
    <button class="btn-trans" onclick="translateText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="playAudio()">▶️ ស្តាប់សំឡេង</button>
    <button class="btn-clear" onclick="clearAll()" style="grid-column: span 2;">🗑️ សម្អាតទិន្នន័យ</button>
  </div>
</div>

<script>
  // API Key ថ្មីរបស់បង
  const getKey = () => "gsk_x3b3Wzg1BEFnphqvkdAXWGdyb3FYIpRZxFEjRUvVPiPbMYhRGBTdq";

  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() {
    document.getElementById('status').style.display = 'none';
  }

  async function askAI() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) {
      alert("សូមវាយអក្សរសិន!");
      return;
    }

    showStatus("⚡ AI កំពុងគិត...");

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { 
          "Authorization": "Bearer " + getKey(), 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: "អ្នកគឺជាជំនួយការ AI ដ៏ឆ្លាតវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរ ឬភាសាដែលបានស្នើសុំ។" },
            { role: "user", content: text }
          ],
          temperature: 0.7
        })
      });

      const data = await res.json();
      hideStatus();

      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = reply;
      } else {
        alert("Error: " + (data.error?.message || "មានបញ្ហាទិន្នន័យ API"));
      }
    } catch(e) {
      hideStatus();
      alert("Network Error: " + e.message);
    }
  }

  async function translateText() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) {
      alert("សូមបញ្ចូលអត្ថបទសម្រាប់បកប្រែ!");
      return;
    }
    const target = document.getElementById('targetLang').value;
    showStatus("🌐 កំពុងបកប្រែ...");

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { 
          "Authorization": "Bearer " + getKey(), 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: `Translate accurately into language code: ${target}. Return only the translation text.` },
            { role: "user", content: text }
          ]
        })
      });

      const data = await res.json();
      hideStatus();

      if (data.choices) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
      } else {
        alert("Translation Error");
      }
    } catch(e) {
      hideStatus();
      alert("Error: " + e.message);
    }
  }

  function playAudio() {
    const text = document.getElementById('outputText').value;
    if (!text) {
      alert("គ្មានអត្ថបទសម្រាប់អានទេ!");
      return;
    }
    if (!('speechSynthesis' in window)) {
      alert("Browser មិនគាំទ្រការអានសំឡេងទេ");
      return;
    }

    window.speechSynthesis.cancel();
    const langMap = { km: 'km-KH', en: 'en-US', fr: 'fr-FR', zh: 'zh-CN', th: 'th-TH' };
    const target = document.getElementById('targetLang').value;
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langMap[target] || 'en-US';
    window.speechSynthesis.speak(utterance);
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    hideStatus();
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  }
</script>
</body>
  </html>
