<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: #252538;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h2 {
      text-align: center;
      color: #00d2ff;
      margin-bottom: 5px;
    }
    .welcome-text {
      text-align: center;
      color: #ffeb3b;
      font-size: 15px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .lang-selects {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }
    .lang-group {
      flex: 1;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #aaa;
    }
    select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
    }
    textarea {
      height: 100px;
      resize: vertical;
      margin-bottom: 15px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 12px 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
    }
    button:active {
      transform: scale(0.95);
    }
    .btn-ask { background: #007bff; }
    .btn-trans { background: #17a2b8; }
    .btn-voice { background: #ffc107; color: #000; }
    .btn-cam { background: #20c997; }
    .btn-live { background: #e83e8c; }
    .btn-song { background: #6f42c1; }
    .btn-play { background: #28a745; }
    .btn-stop { background: #dc3545; }
    .btn-clear { background: #6c757d; grid-column: span 3; }

    /* 🎵 ផ្នែកបញ្ជាភ្លេងផ្ទៃខាងក្រោយ */
    .music-bar {
      background: #1a1a2e;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #444;
    }
    .music-bar span {
      font-size: 13px;
      color: #00d2ff;
    }
    .btn-bg-music {
      background: #6f42c1;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
    }

    /* 📷 Camera Modal */
    .cam-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }
    .cam-box {
      width: 90%;
      max-width: 400px;
      background: #252538;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    video {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
      background: #000;
    }
    canvas { display: none; }
    .cam-btns {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }
    .btn-capture { background: #28a745; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
    .btn-close { background: #dc3545; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-weight: bold; cursor: pointer; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #ffeb3b;
      margin-bottom: 10px;
      display: none;
    }
    .preview-img {
      max-width: 100%;
      max-height: 120px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
      border: 1px solid #00d2ff;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 Groq AI Assistant</h2>
  <!-- 🌟 ពាក្យស្វាគមន៍ឈ្មោះបង -->
  <div id="welcomeMessage" class="welcome-text">👋 សូមស្វាគមន៍មកកាន់ប្រព័ន្ធ AI របស់អ្នកបង!</div>

  <!-- 🎵 ប៊ូតុងបញ្ជាភ្លេងផ្ទៃខាងក្រោយ -->
  <div class="music-bar">
    <span>🎶 ភ្លេងផ្ទៃខាងក្រោយ (Background Music)</span>
    <button class="btn-bg-music" id="bgMusicBtn" onclick="toggleBgMusic()">▶️ ចាក់ភ្លេង</button>
  </div>

  <div class="lang-selects">
    <div class="lang-group">
      <label>🗣️ ភាសាអ្នកនិយាយ</label>
      <select id="srcLang">
        <option value="km">🇰🇭 ភាសាខ្មែរ</option>
        <option value="en">🇺🇸 English</option>
      </select>
    </div>
    <div class="lang-group">
      <label>🌐 ភាសាបកប្រែ</label>
      <select id="targetLang">
        <option value="en">🇺🇸 English</option>
        <option value="km">🇰🇭 ភាសាខ្មែរ</option>
      </select>
    </div>
  </div>

  <div id="status">កំពុងដំណើរការ...</div>
  
  <img id="imagePreview" class="preview-img" alt="Preview">
  
  <textarea id="inputText" placeholder="វាយអក្សរ, ថតរូប ឬចុចនិយាយ..."></textarea>
  <textarea id="outputText" readonly placeholder="លទ្ធផលចម្លើយ AI..."></textarea>

  <div class="btn-grid">
    <button class="btn-ask" onclick="askAI()">✨ សួរ AI</button>
    <button class="btn-trans" onclick="translateText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="toggleVoice()">🎤 និយាយ</button>
    <button class="btn-cam" onclick="openCam()">📸 ថតរូប</button>
    <button class="btn-live" id="liveBtn" onclick="toggleLive()">🔴 និយាយផ្ទាល់</button>
    <button class="btn-song" onclick="makeSong()">🎵 ចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ សម្អាតទាំងអស់</button>
  </div>
</div>

<!-- 📷 Camera Modal -->
<div id="camModal" class="cam-modal">
  <div class="cam-box">
    <h3 style="color:#00d2ff; margin-top:0;">ថតរូបជាមួយកាមេរ៉ា</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="cam-btns">
      <button class="btn-capture" onclick="capture()">ថតរូបនេះ</button>
      <button class="btn-close" onclick="closeCam()">បិទ</button>
    </div>
  </div>
</div>

<script>
  const encodedKey = "Z3NrXzJsZmY0TXk5NjlGcUVnMzFiUGdrV0dkeWIzRllEZkt0bXhNelZKcFMyT2JMempqcHFZQzg=";
  const getKey = () => atob(encodedKey).trim();

  let recognition = null;
  let isListening = false;
  let isLive = false;
  let audioPlayer = new Audio();
  let mediaStream = null;
  let base64Img = null;

  // 🎵 បង្កើត Background Music (ប្រើប្រាស់ Audio ដោយស្វ័យប្រវត្តិពី Lo-Fi Free Stream)
  let bgMusic = new Audio("https://commondatastorage.googleapis.com/codesign-bucket/chill-lofi.mp3"); // ឬតំណភ្ជាប់ភ្លេងផ្សេងទៀត
  bgMusic.loop = true;
  let isMusicPlaying = false;

  function toggleBgMusic() {
    const btn = document.getElementById('bgMusicBtn');
    if (isMusicPlaying) {
      bgMusic.pause();
      isMusicPlaying = false;
      btn.innerText = "▶️ ចាក់ភ្លេង";
    } else {
      bgMusic.play().then(() => {
        isMusicPlaying = true;
        btn.innerText = "⏸️ ឈប់ភ្លេង";
      }).catch(e => {
        alert("មិនអាចចាក់ភ្លេងបានទេ: " + e.message);
      });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 🌟 បង្ហាញការស្វាគមន៍ផ្ទាល់ខ្លួន
    const userName = prompt("សូមបញ្ចូលឈ្មោះរបស់អ្នកបង៖", "ท่าน");
    if (userName) {
      document.getElementById('welcomeMessage').innerText = `👋 សូមស្វាគមន៍វត្តមាន លោក/លោកស្រី ${userName} មកកាន់ប្រព័ន្ធ AI!`;
    }

    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.continuous = false;
      recognition.interimResults = false;
      
      recognition.onstart = () => { isListening = true; showStatus("🎤 កំពុងស្ដាប់សំឡេង..."); };
      recognition.onresult = (e) => {
        document.getElementById('inputText').value = e.results[0][0].transcript;
        hideStatus();
        if (isLive) askAI();
      };
      recognition.onerror = () => { hideStatus(); isListening = false; };
      recognition.onend = () => {
        isListening = false;
        if (isLive) setTimeout(() => recognition.start(), 500);
      };
    }
  });

  async function openCam() {
    document.getElementById('camModal').style.display = 'flex';
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      document.getElementById('video').srcObject = mediaStream;
    } catch(e) {
      alert("មិនអាចបើកកាមេរ៉ាបានទេ: " + e.message);
      closeCam();
    }
  }

  function closeCam() {
    document.getElementById('camModal').style.display = 'none';
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  }

  function capture() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    
    base64Img = c.toDataURL('image/jpeg', 0.8);
    const prev = document.getElementById('imagePreview');
    prev.src = base64Img;
    prev.style.display = 'block';
    
    document.getElementById('inputText').value = "សូមជួយអានអក្សរ និងវិភាគរូបភាពនេះ។";
    closeCam();
    askAI();
  }

  function toggleVoice() {
    if (!recognition) { alert("Browser មិនគាំទ្រសំឡេងទេ"); return; }
    isLive = false;
    document.getElementById('liveBtn').style.background = '#e83e8c';
    if (isListening) { recognition.stop(); return; }
    recognition.lang = document.getElementById('srcLang').value === 'km' ? 'km-KH' : 'en-US';
    stopAudio();
    recognition.start();
  }

  function toggleLive() {
    if (!recognition) { alert("Browser មិនគាំទ្រទេ"); return; }
    isLive = !isLive;
    const btn = document.getElementById('liveBtn');
    if (isLive) {
      btn.style.background = '#28a745';
      showStatus("🔴 កំពុងឡាយផ្ទាល់ជាមួយ AI...");
      recognition.lang = 'km-KH';
      recognition.start();
    } else {
      btn.style.background = '#e83e8c';
      hideStatus();
      recognition.stop();
    }
  }

  async function askAI() {
    const text = document.getElementById('inputText').value.trim() || "សួស្ដី!";
    showStatus("⚡ AI កំពុងគិត...");

    let model = "llama-3.3-70b-versatile";
    let content = text;

    if (base64Img) {
      model = "llama-3.2-11b-vision-preview";
      content = [
        { type: "text", text: text },
        { type: "image_url", image_url: { url: base64Img } }
      ];
    }

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getKey(), "Content-Type": "application/json" },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: "system", content: "អ្នកគឺជាជំនួយការ AI ដ៏ឆ្លាតវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យបានច្បាស់លាស់។" },
            { role: "user", content: content }
          ],
          temperature: 0.7
        })
      });
      const data = await res.json();
      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = reply;
        hideStatus();
        speak(reply, 'km');
      } else {
        hideStatus();
        alert("Error: " + (data.error?.message || "Invalid response"));
      }
    } catch(e) {
      hideStatus();
      alert("Network Error: " + e.message);
    }
  }

  async function translateText() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { alert("សូមបញ្ចូលអត្ថបទ!"); return; }
    const target = document.getElementById('targetLang').value;
    showStatus("🌐 កំពុងបកប្រែ...");

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getKey(), "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: `Translate accurately into ${target === 'km' ? 'Khmer' : 'English'}. Return only translation.` },
            { role: "user", content: text }
          ]
        })
      });
      const data = await res.json();
      if (data.choices) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
        hideStatus();
        speak(translated, target);
      }
    } catch(e) { hideStatus(); alert("Error: " + e.message); }
  }

  function makeSong() {
    document.getElementById('inputText').value = "សូមแต่งบทเพลงสั้นๆ เกี่ยวกับความสุขและความหวัง";
    askAI();
  }

  function speak(text, lang) {
    stopAudio();
    if (!text) return;
    audioPlayer.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text.substring(0, 300))}&tl=${lang}&client=tw-ob`;
    audioPlayer.play().catch(()=>{});
  }

  function playAudio() { audioPlayer.play(); }
  function stopAudio() { audioPlayer.pause(); audioPlayer.currentTime = 0; }

  function clearAll() {
    stopAudio();
    isLive = false;
    document.getElementById('liveBtn').style.background = '#e83e8c';
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    base64Img = null;
    hideStatus();
  }

  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() { document.getElementById('status').style.display = 'none'; }
</script>
</body>
      </html>
