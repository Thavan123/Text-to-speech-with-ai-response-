<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant</title>
  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 15px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h2 {
      text-align: center;
      color: #10b981;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.3em;
    }
    .box-label {
      font-size: 0.85em;
      color: #34d399;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 5px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 0.95em;
      font-family: inherit;
      resize: vertical;
      line-height: 1.5;
    }
    #outputText {
      background-color: #090d16;
      border-color: #059669;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.9em;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn-ask { background-color: #059669; }
    .btn-translate { background-color: #2563eb; }
    .btn-clear { background-color: #475569; grid-column: span 2; }
    button:active { transform: scale(0.96); }
    #statusBox {
      display: none;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85em;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>⚡ Groq AI Assistant</h2>

  <div class="box-label">✏️ សំណួរ ឬអត្ថបទរបស់អ្នក៖</div>
  <textarea id="inputText" placeholder="សរសេរសំណួរជាភាសាខ្មែរ ឬភាសាដទៃនៅទីនេះ..."></textarea>

  <div class="box-label">🤖 ចម្លើយពី Groq AI៖</div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលនឹងបង្ហាញយ៉ាងលឿននៅទីនេះ..."></textarea>

  <div id="statusBox">
    <span id="statusText">Groq កំពុងដំណើរការ...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askGroqAI()">🚀 សួរ Groq AI</button>
    <button class="btn-translate" onclick="translateGroq()">🌐 បកប្រែភាសា</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុបចោល</button>
  </div>
</div>

<script>
// 🔑 ដាក់ Groq API Key របស់អ្នកនៅទីនេះ (ទម្រង់ចាប់ផ្តើមដោយ gsk_...)
const GROQ_API_KEY = "gsk_សូមដាក់GroqApiKeyរបស់អ្នកនៅទីនេះ";

async function askGroqAI() {
  const promptText = document.getElementById('inputText').value.trim();
  if (!promptText) {
    alert("សូមបញ្ចូលសំណួរជាមុនសិន!");
    return;
  }

  showStatus("⚡ Groq កំពុងឆ្លើយតបយ៉ាងលឿន...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${GROQ_API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile", // ម៉ូឌែលជំនាន់ចុងក្រោយដ៏មានឥទ្ធិពល និងលឿនបំផុតរបស់ Groq
        messages: [
          {
            role: "system",
            content: "អ្នកគឺជាជំនួយការ AI ដ៏ឈ្លាសវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យបានច្បាស់លាស់ ធម្មជាតិ និងស្រួលយល់។"
          },
          {
            role: "user",
            content: promptText
          }
        ],
        temperature: 0.7
      })
    });

    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      const reply = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = reply;
    } else {
      alert("មានបញ្ហាពីប្រព័ន្ធ Groq: " + (data.error?.message || "មិនអាចទាញយកទិន្នន័យបានទេ"));
    }
  } catch (error) {
    alert("បញ្ហាการតភ្ជាប់៖ " + error.message);
  } finally {
    hideStatus();
  }
}

async function translateGroq() {
  const promptText = document.getElementById('inputText').value.trim();
  if (!promptText) {
    alert("សូមបញ្ចូលអត្ថបទដើម្បីបកប្រែ!");
    return;
  }

  showStatus("🌐 Groq កំពុងបកប្រែ...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${GROQ_API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "user",
            content: `Translate the following text accurately into Khmer (if it's in another language) or into English (if it's in Khmer). Return ONLY the translated text:\n\n${promptText}`
          }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      document.getElementById('outputText').value = data.choices[0].message.content.trim();
    }
  } catch (error) {
    alert("មានបញ្ហាក្នុងការបកប្រែ៖ " + error.message);
  } finally {
    hideStatus();
  }
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').value = '';
}

function showStatus(msg) {
  const statusBox = document.getElementById('statusBox');
  statusBox.style.display = 'block';
  document.getElementById('statusText').innerText = msg;
}

function hideStatus() {
  document.getElementById('statusBox').style.display = 'none';
}
</script>
</body>
</html>
