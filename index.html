<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khuon Thavan - AI Assistant</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🌟 Splash Screen ផ្ទាំងស្វាគមន៍ដំបូង */
    #splashScreen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      text-align: center;
      padding: 20px;
      transition: opacity 1.5s ease;
    }
    #splashScreen h1 {
      font-size: 24px;
      color: #00d2ff;
      margin-bottom: 25px;
      line-height: 1.5;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .btn-enter {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(219,39,119,0.4);
      transition: 0.3s;
    }
    .btn-enter:active {
      transform: scale(0.95);
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #252538;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .lang-selects {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lang-group {
      flex: 1;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #aaa;
    }
    select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    textarea {
      height: 90px;
      resize: vertical;
      margin-bottom: 12px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      padding: 12px 6px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
      text-align: center;
    }
    button:active {
      transform: scale(0.95);
    }
    .btn-ask { background: #0284c7; }
    .btn-trans { background: #0ea5e9; }
    .btn-voice { background: #eab308; color: #000; }
    .btn-cam { background: #14b8a6; }
    .btn-live { background: #db2777; }
    .btn-song { background: #8b5cf6; }
    .btn-play { background: #16a34a; }
    .btn-stop { background: #dc2626; }
    .btn-clear { background: #64748b; width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; font-weight: bold; color: #fff; border: none; cursor: pointer;}

    /* 📷 Camera Modal */
    .cam-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }
    .cam-box {
      width: 90%;
      max-width: 400px;
      background: #252538;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    video {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
      background: #000;
    }
    canvas { display: none; }
    .cam-btns {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }
    .btn-capture { background: #16a34a; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
    .btn-close { background: #dc2626; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-weight: bold; cursor: pointer; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 10px;
      display: none;
    }
    .preview-img {
      max-width: 100%;
      max-height: 100px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
      border: 1px solid #00d2ff;
    }
  </style>
</head>
<body>

<!-- 🌟 ផ្ទាំងស្វាគមន៍ដំបូង -->
<div id="splashScreen">
  <h1>🙏 សូមស្វាគមន៍មកកាន់វេបសាយរបស់លោក ឃួន ថាវ៉ាន់</h1>
  <button class="btn-enter" onclick="enterWebsite()">ចូលទៅកាន់វេបសាយ</button>
</div>

<div class="container">
  <div class="lang-selects">
    <div class="lang-group">
      <label>🗣️ ភាសាអ្នកនិយាយ</label>
      <select id="srcLang">
        <option value="km">🇰🇭 ភាសាខ្មែរ</option>
        <option value="en">🇺🇸 English</option>
      </select>
    </div>
    <div class="lang-group">
      <label>🌐 ភាសាបកប្រែ</label>
      <select id="targetLang">
        <option value="en">🇺🇸 English</option>
        <option value="km">🇰🇭 ភាសាខ្មែរ</option>
      </select>
    </div>
  </div>

  <div id="status">កំពុងដំណើរการ...</div>
  
  <img id="imagePreview" class="preview-img" alt="Preview">
  
  <textarea id="inputText" placeholder="វាយអក្សរ, ថតរូប ឬចុចនិយាយ..."></textarea>
  <textarea id="outputText" readonly placeholder="លទ្ធផលចម្លើយ AI..."></textarea>

  <div class="btn-grid">
    <button class="btn-ask" onclick="askAI()">✨ សួរ AI</button>
    <button class="btn-trans" onclick="translateText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="toggleVoice()">🎤 និយាយ</button>
    <button class="btn-cam" onclick="openCam()">📸 ថតរូប</button>
    <button class="btn-live" id="liveBtn" onclick="toggleLive()">🔴 និយាយផ្ទាល់</button>
    <button class="btn-song" onclick="makeSong()">🎵 ចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
  </div>

  <button class="btn-clear" onclick="clearAll()">🗑️ សម្អាតទាំងអស់</button>
</div>

<!-- 📷 Camera Modal -->
<div id="camModal" class="cam-modal">
  <div class="cam-box">
    <h3 style="color:#00d2ff; margin-top:0;">ថតរូបជាមួយកាមេរ៉ា</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="cam-btns">
      <button class="btn-capture" onclick="capture()">ថតរូបនេះ</button>
      <button class="btn-close" onclick="closeCam()">បិទ</button>
    </div>
  </div>
</div>

<script>
  const encodedKey = "Z3NrXzJsZmY0TXk5NjlGcUVnMzFiUGdrV0dkeWIzRllEZkt0bXhNelZKcFMyT2JMempqcHFZQzg=";
  const getKey = () => atob(encodedKey).trim();

  let recognition = null;
  let isListening = false;
  let isLive = false;
  let isAiSpeaking = false; // 🛡️ ទប់ស្កាត់កុំឱ្យចាប់សំឡេងខ្លួនឯង
  let mediaStream = null;
  let base64Img = null;

  // 🎵 ភ្លេងស្វាគមន៍ ១០វិនាទី
  let introMusic = new Audio("https://commondatastorage.googleapis.com/codesign-bucket/chill-lofi.mp3");

  function enterWebsite() {
    const splash = document.getElementById('splashScreen');
    splash.style.opacity = '0'; // រលាយផ្ទាំងបន្តិចម្ដងៗ
    
    // ចាក់ភ្លេងរយៈពេល ១០ វិនាទី
    introMusic.play().catch(e => console.log(e));
    setTimeout(() => {
      introMusic.pause();
      introMusic.currentTime = 0;
    }, 10000);

    setTimeout(() => {
      splash.style.display = 'none';
    }, 1500);
  }

  document.addEventListener('DOMContentLoaded', () => {
    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.continuous = false;
      recognition.interimResults = false;
      
      recognition.onstart = () => { 
        if (isAiSpeaking) {
          recognition.stop(); // បើ AI កំពុងនិយាយ ហាមឃាត់ Mic មិនឱ្យចាប់
          return;
        }
        isListening = true; 
        showStatus("🎤 កំពុងស្ដាប់សំឡេង..."); 
      };
      
      recognition.onresult = (e) => {
        if (isAiSpeaking) return; // បដិសេធប្រសិនបើជាសំឡេង AI
        const spokenText = e.results[0][0].transcript;
        document.getElementById('inputText').value = spokenText;
        hideStatus();
        isListening = false;
        
        askAI();
      };
      
      recognition.onerror = () => { 
        hideStatus(); 
        isListening = false; 
      };
      
      recognition.onend = () => {
        isListening = false;
        if (isLive && !isAiSpeaking) {
          setTimeout(() => { if(isLive && !isAiSpeaking) recognition.start(); }, 800);
        }
      };
    }
  });

  async function openCam() {
    document.getElementById('camModal').style.display = 'flex';
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      document.getElementById('video').srcObject = mediaStream;
    } catch(e) {
      alert("មិនអាចបើកកាមេរ៉ាបានទេ: " + e.message);
      closeCam();
    }
  }

  function closeCam() {
    document.getElementById('camModal').style.display = 'none';
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  }

  function capture() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    
    base64Img = c.toDataURL('image/jpeg', 0.8);
    const prev = document.getElementById('imagePreview');
    prev.src = base64Img;
    prev.style.display = 'block';
    
    document.getElementById('inputText').value = "សូមជួយអានអក្សរ និងវិភាគរូបភាពនេះ។";
    closeCam();
    askAI();
  }

  function toggleVoice() {
    if (!recognition) { alert("Browser មិនគាំទ្រសំឡេងទេ"); return; }
    isLive = false;
    document.getElementById('liveBtn').style.background = '#db2777';
    if (isListening) { recognition.stop(); return; }
    recognition.lang = document.getElementById('srcLang').value === 'km' ? 'km-KH' : 'en-US';
    stopAudio();
    recognition.start();
  }

  function toggleLive() {
    if (!recognition) { alert("Browser មិនគាំទ្រទេ"); return; }
    isLive = !isLive;
    const btn = document.getElementById('liveBtn');
    if (isLive) {
      btn.style.background = '#16a34a';
      showStatus("🔴 កំពុងឡាយផ្ទាល់ជាមួយ AI...");
      recognition.lang = document.getElementById('srcLang').value === 'km' ? 'km-KH' : 'en-US';
      recognition.start();
    } else {
      btn.style.background = '#db2777';
      hideStatus();
      recognition.stop();
    }
  }

  async function askAI() {
    const text = document.getElementById('inputText').value.trim() || "សួស្ដី!";
    showStatus("⚡ AI កំពុងគិត...");

    let model = "llama-3.3-70b-versatile";
    let content = text;

    if (base64Img) {
      model = "llama-3.2-11b-vision-preview";
      content = [
        { type: "text", text: text },
        { type: "image_url", image_url: { url: base64Img } }
      ];
    }

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getKey(), "Content-Type": "application/json" },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: "system", content: "អ្នកគឺជាជំនួយការ AI ដ៏ឆ្លាតវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យបានខ្លី និងច្បាស់លាស់។" },
            { role: "user", content: content }
          ],
          temperature: 0.7
        })
      });
      const data = await res.json();
      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = reply;
        hideStatus();
        
        const langCode = document.getElementById('srcLang').value === 'km' ? 'km' : 'en';
        speak(reply, langCode, () => {
          // បន្ទាប់ពី AI និយាយចប់ ទើបបើក Mic ឱ្យស្តាប់បន្តបើស្ថិតក្នុងរបៀប Live
          if (isLive) {
            setTimeout(() => {
              if (isLive && !isAiSpeaking) recognition.start();
            }, 600);
          }
        });
      } else {
        hideStatus();
        alert("Error: " + (data.error?.message || "Invalid response"));
      }
    } catch(e) {
      hideStatus();
      alert("Network Error: " + e.message);
    }
  }

  async function translateText() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { alert("សូមបញ្ចូលអត្ថបទ!"); return; }
    const target = document.getElementById('targetLang').value;
    showStatus("🌐 កំពុងបកប្រែ...");

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getKey(), "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: `Translate accurately into ${target === 'km' ? 'Khmer' : 'English'}. Return only translation.` },
            { role: "user", content: text }
          ]
        })
      });
      const data = await res.json();
      if (data.choices) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
        hideStatus();
        speak(translated, target);
      }
    } catch(e) { hideStatus(); alert("Error: " + e.message); }
  }

  function makeSong() {
    document.getElementById('inputText').value = "សូមแต่งบทเพลงสั้นๆ เกี่ยวกับความสุขและความหวัง";
    askAI();
  }

  // 🔊 មុខងារនិយាយ និងការពារមិនឱ្យ Mic ចាប់សំឡេង AI ខ្លួនឯង
  function speak(text, lang, onEndCallback) {
    if (!('speechSynthesis' in window)) {
      if (onEndCallback) onEndCallback();
      return;
    }
    window.speechSynthesis.cancel();
    
    if (!text) {
      if (onEndCallback) onEndCallback();
      return;
    }

    const cleanText = text.replace(/[*#_`]/g, '');
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = (lang === 'km') ? 'km-KH' : 'en-US';
    utterance.rate = 1.0;
    
    utterance.onstart = () => {
      isAiSpeaking = true; // 🔒 បិទសិទ្ធិ Mic ពេល AI កំពុងនិយាយ
      if (isListening && recognition) {
        recognition.stop();
      }
    };

    utterance.onend = () => {
      isAiSpeaking = false; // 🔓 បើកសិទ្ធិឱ្យ Mic ដំណើរការវិញក្រោយ AI និយាយចប់
      if (onEndCallback) onEndCallback();
    };
    
    utterance.onerror = () => {
      isAiSpeaking = false;
      if (onEndCallback) onEndCallback();
    };

    window.speechSynthesis.speak(utterance);
  }

  function playAudio() {
    const text = document.getElementById('outputText').value;
    const lang = document.getElementById('targetLang').value;
    speak(text, lang);
  }

  function stopAudio() {
    isAiSpeaking = false;
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
    }
  }

  function clearAll() {
    stopAudio();
    isLive = false;
    document.getElementById('liveBtn').style.background = '#db2777';
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    base64Img = null;
    hideStatus();
  }

  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() { document.getElementById('status').style.display = 'none'; }
</script>
</body>
</html>
