<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant & Translator</title>

  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 15px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    .lang-container {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lang-box {
      flex: 1;
    }
    .lang-box label {
      display: block;
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 0.95em;
      font-family: inherit;
    }
    select {
      margin-bottom: 10px;
    }

    .box-label {
      font-size: 0.85em;
      color: #38bdf8;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    textarea {
      height: 95px;
      resize: vertical;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #outputText {
      background-color: #090d16;
      border-color: #0284c7;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 5px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.85em;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn-ask { background-color: #0284c7; }
    .btn-translate { background-color: #2563eb; }
    .btn-voice { background-color: #d97706; }
    .btn-music { background-color: #9333ea; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; grid-column: span 3; }

    button:active { transform: scale(0.96); }

    #statusBox {
      display: none;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .history-box {
      margin-top: 15px;
      border-top: 1px solid #334155;
      padding-top: 10px;
    }
    .history-item {
      background: #0f172a;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 0.8em;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>✨ Groq AI Assistant & Translator</h2>

  <div class="lang-container">
    <div class="lang-box">
      <label for="srcLangSelect">🗣️ ភាសាអ្នកនិយាយ/វាយ៖</label>
      <select id="srcLangSelect">
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en">🇺🇸 English (US)</option>
        <option value="fr">🇫🇷 Français (French)</option>
        <option value="zh">🇨🇳 中文 (Chinese)</option>
        <option value="ja">🇯🇵 日本語 (Japanese)</option>
        <option value="ko">🇰🇷 한국어 (Korean)</option>
        <option value="th">🇹🇭 ភាសាថៃ (Thai)</option>
        <option value="vi">🇻🇳 Tiếng Việt (Vietnamese)</option>
        <option value="de">🇩🇪 Deutsch (German)</option>
        <option value="es">🇪🇸 Español (Spanish)</option>
      </select>
    </div>

    <div class="lang-box">
      <label for="targetLangSelect">🌐 ភាសាចង់បកប្រែទៅ៖</label>
      <select id="targetLangSelect">
        <option value="en">🇺🇸 English (US)</option>
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="fr">🇫🇷 Français (French)</option>
        <option value="zh">🇨🇳 中文 (Chinese)</option>
        <option value="ja">🇯🇵 日本語 (Japanese)</option>
        <option value="ko">🇰🇷 한국어 (Korean)</option>
        <option value="th">🇹🇭 ភាសាថៃ (Thai)</option>
        <option value="vi">🇻🇳 Tiếng Việt (Vietnamese)</option>
        <option value="de">🇩🇪 Deutsch (German)</option>
        <option value="es">🇪🇸 Español (Spanish)</option>
      </select>
    </div>
  </div>

  <div class="box-label">
    <span>✏️ អត្ថបទ ឬ សំឡេងរបស់អ្នក៖</span>
  </div>
  <textarea id="inputText" placeholder="វាយអក្សរ ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div class="box-label">
    <span>🤖 ចម្លើយ Groq AI / លទ្ធផលបកប្រែ៖</span>
  </div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលឆ្លើយតប ឬបកប្រែនឹងបង្ហាញនៅទីនេះ..."></textarea>

  <div id="statusBox">
    <span id="statusText">...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askGroqAI()">✨ សួរ Groq</button>
    <button class="btn-translate" onclick="translateGroqText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    <button class="btn-music" onclick="generateGroqSong()">🎵 តែងចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
  </div>

  <div class="history-box">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size:0.85em;">📜 ប្រវត្តិបទចម្រៀង AI</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; padding:0; cursor:pointer; font-size:0.8em;">🗑️ លុបប្រវត្តិ</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
  // Base64 Encoded Groq API Key របស់អ្នក
  const encodedGroqKey = "Z3NrXzJsZmY0TXk5NjlGcUVnMzFiUGdrV0dkeWIzRllEZkt0bXhNelZKcFMyT2JMempqcHFZQzg=";

  function getGroqApiKey() {
    return atob(encodedGroqKey).trim();
  }

  let recognition = null;
  let isListening = false;
  let audioPlayer = new Audio();

  document.addEventListener('DOMContentLoaded', () => {
    loadSongHistory();
    initSpeechRecognition();
  });

  function initSpeechRecognition() {
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = function() { 
        isListening = true; 
        showStatus("🎤 កំពុងស្ដាប់សំឡេងរបស់អ្នក..."); 
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById('inputText').value = transcript;
        hideStatus();
        askGroqAI(); 
      };

      recognition.onerror = function(event) { 
        hideStatus(); 
        isListening = false; 
      };

      recognition.onend = function() { 
        isListening = false; 
      };
    }
  }

  function startVoiceInput() {
    if (!recognition) { 
      alert("Browser របស់អ្នកមិនគាំទ្រមុខងារចាប់សំឡេងទេ!"); 
      return; 
    }
    if (isListening) { 
      recognition.stop(); 
      return; 
    }
    const lang = document.getElementById('srcLangSelect').value;
    recognition.lang = lang === 'km' ? 'km-KH' : (lang === 'en' ? 'en-US' : lang);
    stopAudio();
    recognition.start();
  }

  async function askGroqAI() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    const srcLang = document.getElementById('srcLangSelect').value;

    if (!promptText) { 
      alert("សូមបញ្ចូលសំណួរក្នុងប្រអប់ខាងលើជាមុនសិន!"); 
      return; 
    }

    stopAudio();
    showStatus("⚡ Groq AI កំពុងគិត និងត្រៀមឆ្លើយតប...");

    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            {
              role: "system",
              content: "អ្នកគឺជាជំនួយការ AI ដ៏ឈ្លាសវៃ និងសុភាពរាបសារ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យមានលក្ខណៈធម្មជាតិ ដូចមនុស្សនិយាយគ្នា មិនរឹងកំព្រឹស និងស្រួលយល់។"
            },
            {
              role: "user",
              content: promptText
            }
          ],
          temperature: 0.7
        })
      });

      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        const aiReply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = aiReply;
        hideStatus();
        speakText(aiReply, srcLang);
      } else {
        hideStatus();
        alert("Error: " + (data.error?.message || "Invalid API response"));
      }
    } catch (error) { 
      hideStatus(); 
      alert("Network error: " + error.message); 
    }
  }

  async function translateGroqText() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    const targetLang = document.getElementById('targetLangSelect').value;

    if (!promptText) { 
      alert("សូមបញ្ចូលអត្ថបទដើម្បីបកប្រែ!"); 
      return; 
    }

    stopAudio();
    showStatus("🌐 Groq កំពុងបកប្រែភាសា...");

    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            {
              role: "system",
              content: `You are a professional translator. Translate the text accurately and naturally into language code "${targetLang}". Return ONLY the translated text without extra explanation.`
            },
            {
              role: "user",
              content: promptText
            }
          ],
          temperature: 0.3
        })
      });

      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
        hideStatus();
        speakText(translated, targetLang);
      } else {
        hideStatus();
        alert("Translation error!");
      }
    } catch (error) {
      hideStatus();
      alert("Network error: " + error.message);
    }
  }

  async function generateGroqSong() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    const lang = document.getElementById('srcLangSelect').value;

    if (!promptText) { 
      alert("សូមបញ្ចូលប្រធានបទចម្រៀងក្នុងប្រអប់ខាងលើ!"); 
      return; 
    }

    stopAudio();
    showStatus("🎵 Groq កំពុងតែងបទចម្រៀង...");

    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            {
              role: "system",
              content: "You are a professional songwriter. Write catchy and poetic song lyrics based on the user's topic. Return ONLY the lyrics."
            },
            {
              role: "user",
              content: promptText
            }
          ],
          temperature: 0.8
        })
      });

      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        const lyrics = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = lyrics;
        hideStatus();
        speakText(lyrics, lang);
        saveToHistory(promptText);
      } else {
        hideStatus();
        alert("មិនអាចតែងចម្រៀងបានទេ!");
      }
    } catch (error) {
      hideStatus();
      alert("Network error: " + error.message);
    }
  }

  function speakText(text, langCode) {
    stopAudio();
    if (!text) return;

    const cleanText = encodeURIComponent(text.substring(0, 300));
    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${cleanText}&tl=${langCode}&client=tw-ob`;

    audioPlayer.src = ttsUrl;
    audioPlayer.play().catch(() => {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langCode === 'km' ? 'km-KH' : langCode;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    });
  }

  function playAudio() {
    const text = document.getElementById('outputText').value.trim() || document.getElementById('inputText').value.trim();
    const lang = document.getElementById('targetLangSelect').value;
    if (!text) {
      alert("មិនមានអត្ថបទដើម្បីចាក់សំឡេងទេ!");
      return;
    }
    speakText(text, lang);
  }

  function stopAudio() {
    if (audioPlayer) {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
    }
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
    }
  }

  function clearAll() {
    stopAudio();
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
  }

  function saveToHistory(title) {
    let history = JSON.parse(localStorage.getItem('groq_song_history')) || [];
    history.unshift({ title: title || "បទចម្រៀង AI", date: new Date().toLocaleTimeString() });
    if (history.length > 15) history.pop();
    localStorage.setItem('groq_song_history', JSON.stringify(history));
    loadSongHistory();
  }

  function loadSongHistory() {
    const historyList = document.getElementById('historyList');
    if (!historyList) return;
    let history = JSON.parse(localStorage.getItem('groq_song_history')) || [];
    if (history.length === 0) { 
      historyList.innerHTML = '<p style="font-size: 0.8em; color: #888;">មិនទាន់មានប្រវត្តិ</p>'; 
      return; 
    }
    historyList.innerHTML = '';
    history.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<span>🎵 ${item.title}</span>`;
      historyList.appendChild(div);
    });
  }

  function clearHistory() { 
    localStorage.removeItem('groq_song_history'); 
    loadSongHistory(); 
  }

  function showStatus(msg) {
    const statusBox = document.getElementById('statusBox');
    statusBox.style.display = 'block';
    document.getElementById('statusText').innerText = msg;
  }

  function hideStatus() {
    document.getElementById('statusBox').style.display = 'none';
  }
</script>
</body>
  </html>
