<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khuon Thavan - PDF & Image Text Extractor</title>
  <!-- នាំយកបណ្ណាល័យ PDF.js សម្រាប់អានហ្វាល់ PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <!-- នាំយកបណ្ណាល័យ Tesseract.js សម្រាប់អានអក្សរពីរូបភាព (OCR) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.0.2/tesseract.min.js"></script>
  <style>
    :root {
      --primary: #7c3aed;
      --accent: #00d2ff;
      --bg-dark: #0f0c29;
      --card-bg: rgba(37, 37, 56, 0.95);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #ffffff;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-top: 0;
      font-size: 19px;
      margin-bottom: 15px;
    }

    .upload-box {
      border: 2px dashed rgba(0, 210, 255, 0.4);
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      background: rgba(26, 26, 46, 0.6);
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-box:hover {
      border-color: var(--accent);
    }
    input[type="file"] {
      display: none;
    }
    .upload-label {
      cursor: pointer;
      font-size: 14px;
      color: #ddd;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26, 26, 46, 0.9);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    .btn-grid {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button:active {
      transform: scale(0.97);
    }
    .btn-copy { background: #16a34a; }
    .btn-clear { background: #64748b; }

    #status {
      text-align: center;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 10px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📄 ទាញយកអត្ថបទពី PDF និងរូបភាព</h2>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="upload-label">
      📁 <b>ចុចទីនេះដើម្បីជ្រើសរើសហ្វាល់</b><br>
      <span style="font-size: 12px; color: #aaa;">(គាំទ្រហ្វាល់ PDF និងរូបភាព PNG, JPG)</span>
    </div>
    <input type="file" id="fileInput" accept=".pdf,image/*" onchange="handleFile(this)">
  </div>

  <div id="status">កំពុងដំណើរការ...</div>
  
  <textarea id="resultText" placeholder="អត្ថបទដែលទាញយកបាននឹងបង្ហាញទីនេះ..."></textarea>

  <div class="btn-grid">
    <button class="btn-copy" onclick="copyText()">📋 ចម្លងអត្ថបទ (Copy)</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ សម្អាត</button>
  </div>
</div>

<script>
  // កំណត់ Worker សម្រាប់ PDF.js
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  function showStatus(msg) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
  }
  function hideStatus() {
    document.getElementById('status').style.display = 'none';
  }

  async function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('resultText').value = '';

    // ប្រសិនបើជាហ្វាល់ PDF
    if (file.type === "application/pdf") {
      showStatus("📖 កំពុងអានហ្វាល់ PDF...");
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          showStatus(`📖 កំពុងអានទំព័រទី ${i} នៃ ${pdf.numPages}...`);
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(" ");
          fullText += `--- ទំព័រទី ${i} ---\n` + pageText + "\n\n";
        }

        document.getElementById('resultText').value = fullText.trim();
        hideStatus();
      } catch (err) {
        hideStatus();
        alert("មានបញ្ហាក្នុងការអាន PDF: " + err.message);
      }
    } 
    // ប្រសិនបើជារូបភាព (PNG, JPG)
    else if (file.type.startsWith("image/")) {
      showStatus("🔍 កំពុងទាញយកអក្សរពីរូបភាព (OCR)...");
      Tesseract.recognize(
        file,
        'eng+khm', // គាំទ្រភាសាអង់គ្លេស និងខ្មែរ
        { 
          logger: m => {
            if (m.status === 'recognizing text') {
              showStatus(`🔍 កំពុងអាន: ${Math.round(m.progress * 100)}%`);
            }
          } 
        }
      ).then(({ data: { text } }) => {
        document.getElementById('resultText').value = text;
        hideStatus();
      }).catch(err => {
        hideStatus();
        alert("មានបញ្ហាក្នុងការអានរូបភាព: " + err.message);
      });
    } else {
      alert("សូមជ្រើសរើសយករូបភាព ឬហ្វាល់ PDF ជាមុនសិន!");
    }
  }

  function copyText() {
    const text = document.getElementById('resultText');
    if (!text.value) {
      alert("គ្មានអត្ថបទសម្រាប់ចម្លងទេ!");
      return;
    }
    text.select();
    text.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(text.value).then(() => {
      alert("✅ បានចម្លងអត្ថបទជោគជ័យ!");
    });
  }

  function clearAll() {
    document.getElementById('fileInput').value = '';
    document.getElementById('resultText').value = '';
    hideStatus();
  }
</script>
</body>
      </html>
