<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ & AI Assistant</title>
  
  <!-- ResponsiveVoice Library សម្រាប់ចាក់សំឡេង -->
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
  
  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }
    label {
      font-size: 0.9em;
      color: #94a3b8;
    }
    select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 1em;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 12px 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    .btn-ask { background-color: #0284c7; }
    .btn-voice { background-color: #d97706; }
    .btn-music { background-color: #9333ea; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; }
    button:active { transform: scale(0.96); }
    
    #statusBox {
      display: none;
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 15px;
    }
    .history-box {
      margin-top: 20px;
      border-top: 1px solid #334155;
      padding-top: 15px;
    }
    .history-item {
      background: #0f172a;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 6px;
      font-size: 0.85em;
    }
    .key-btn {
      background: none;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      width: 100%;
      margin-bottom: 15px;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 កម្មវិធីអានអត្ថបទ & AI Assistant</h2>

  <button class="key-btn" onclick="resetApiKey()">🔑 ដូរ/បញ្ចូល API Key ថ្មី</button>

  <label for="langSelect">🔤 ជ្រើសរើសភាសា (Language):</label>
  <select id="langSelect">
    <option value="km-KH">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
    <option value="en-US">🇺🇸 English (US)</option>
    <option value="fr-FR">🇫🇷 Français (French)</option>
    <option value="zh-CN">🇨🇳 中文 (Chinese)</option>
    <option value="ja-JP">🇯🇵 日本語 (Japanese)</option>
    <option value="ko-KR">🇰🇷 한국어 (Korean)</option>
    <option value="th-TH">🇹🇭 ភាសាថៃ (Thai)</option>
    <option value="vi-VN">🇻🇳 Tiếng Việt (Vietnamese)</option>
    <option value="lo-LA">🇱🇦 ភាសាឡាវ (Lao)</option>
    <option value="de-DE">🇩🇪 Deutsch (German)</option>
    <option value="es-ES">🇪🇸 Español (Spanish)</option>
  </select>

  <textarea id="textInput" placeholder="វាយអក្សរនៅទីនេះ ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div id="statusBox">
    <span id="statusText">...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askAI()">✨ សួរ AI</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    <button class="btn-music" onclick="generateSunoMusic()">🎵 តែងចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុប</button>
  </div>

  <div class="history-box">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span>📜 ប្រវត្តិបទចម្រៀង MP3</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; padding:0; cursor:pointer;">🗑️ លុបប្រវត្តិ</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// --- មុខងារទាញយក API Key ដោយសុវត្ថិភាព ---
function getGroqApiKey() {
  let key = localStorage.getItem('GROQ_API_KEY');
  if (!key) {
    key = prompt("សូមបញ្ចូល Groq API Key របស់អ្នក (ផ្តើមដោយ gsk_):");
    if (key) {
      key = key.replace(/[^\x00-\x7F]/g, "").trim();
      localStorage.setItem('GROQ_API_KEY', key);
    }
  }
  return key;
}

function resetApiKey() {
  localStorage.removeItem('GROQ_API_KEY');
  let key = prompt("សូមបញ្ចូល Groq API Key ថ្មីរបស់អ្នក (gsk_...):");
  if (key) {
    key = key.replace(/[^\x00-\x7F]/g, "").trim();
    localStorage.setItem('GROQ_API_KEY', key);
    alert("បានរក្សាទុក API Key ថ្មីរួចរាល់!");
  }
}

let recognition = null;
let isListening = false;
let isContinuousMode = false;

document.addEventListener('DOMContentLoaded', () => {
  loadSongHistory();
  initSpeechRecognition();
});

// --- ១. មុខងារចាប់សំឡេង (Speech-to-Text) ---
function initSpeechRecognition() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() { 
      isListening = true; 
      showStatus("🎤 កំពុងស្ដាប់សំឡេងរបស់អ្នក..."); 
    };

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      document.getElementById('textInput').value = transcript;
      hideStatus();
      askAI(); 
    };

    recognition.onerror = function(event) { 
      hideStatus(); 
      console.error("Speech Error:", event.error);
      isListening = false; 
    };

    recognition.onend = function() { 
      isListening = false; 
    };
  }
}

function startVoiceInput() {
  if (!recognition) { 
    alert("Browser របស់អ្នកមិនគាំទ្រមុខងារចាប់សំឡេងទេ!"); 
    return; 
  }
  if (isListening) { 
    recognition.stop(); 
    return; 
  }
  isContinuousMode = true; 
  recognition.lang = document.getElementById('langSelect').value;
  stopAudio();
  recognition.start();
}

// --- ២. មុខងារសួរ AI ---
async function askAI() {
  const apiKey = getGroqApiKey();
  if (!apiKey) {
    alert("សូមបញ្ចូល API Key ដើម្បីប្រើប្រាស់!");
    return;
  }

  const promptText = document.getElementById('textInput').value.trim();
  const lang = document.getElementById('langSelect').value;
  if (!promptText) { 
    alert("សូមបញ្ចូលសំណួរជាមុនសិន!"); 
    return; 
  }
  
  stopAudio();
  showStatus("🤖 AI កំពុងគិត និងត្រៀមឆ្លើយតប...");
  
  const cleanKey = apiKey.replace(/[^\x00-\x7F]/g, "").trim();

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + cleanKey
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.5,
        messages: [
          { role: "system", content: `You are a helpful AI voice assistant. Respond accurately and concisely in language code: ${lang}. Keep response short and clear.` }, 
          { role: "user", content: promptText }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0].message.content) {
      const aiReply = data.choices[0].message.content.trim();
      document.getElementById('textInput').value = aiReply;
      hideStatus();
      
      speakText(aiReply, lang);

    } else if (data.error) {
      hideStatus();
      alert("Groq Error: " + data.error.message);
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហាភ្ជាប់ទៅ AI៖ " + error.message); 
  }
}

// --- ៣. មុខងារបំប្លែងអក្សរទៅជាសំឡេង (គាំទ្រច្រើនភាសា) ---
function speakText(text, langSelect) {
  stopAudio();

  const langCode = langSelect.split('-')[0];
  let voiceName = "Khmer Female"; // Default Khmer

  // រៀបចំសំឡេង ResponsiveVoice តាមភាសា
  const voiceMap = {
    'en': 'US English Female',
    'fr': 'French Female',
    'zh': 'Chinese Female',
    'ja': 'Japanese Female',
    'ko': 'Korean Female',
    'th': 'Thai Female',
    'vi': 'Vietnamese Female',
    'de': 'Deutsch Female',
    'es': 'Spanish Female'
  };

  if (voiceMap[langCode]) {
    voiceName = voiceMap[langCode];
  }

  if (typeof responsiveVoice !== 'undefined') {
    responsiveVoice.speak(text, voiceName, {
      rate: 0.95,
      pitch: 1,
      onend: function() {
        if (isContinuousMode) {
          setTimeout(() => { startVoiceInput(); }, 500);
        }
      }
    });
  } else if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langSelect;
    utterance.onend = function() {
      if (isContinuousMode) {
        setTimeout(() => { startVoiceInput(); }, 500);
      }
    };
    window.speechSynthesis.speak(utterance);
  } else {
    alert("មិនអាចចាក់សំឡេងបានទេ!");
  }
}

// --- ៤. មុខងារបង្កើតបទចម្រៀង ---
async function generateSunoMusic() {
  const apiKey = getGroqApiKey();
  if (!apiKey) {
    alert("សូមបញ្ចូល API Key ដើម្បីប្រើប្រាស់!");
    return;
  }

  const promptText = document.getElementById('textInput').value.trim();
  const lang = document.getElementById('langSelect').value;
  if (!promptText) { 
    alert("សូមបញ្ចូលប្រធានបទចម្រៀង!"); 
    return; 
  }
  
  stopAudio();
  showStatus("🎵 AI កំពុងតែងបទចម្រៀង...");
  
  const cleanKey = apiKey.replace(/[^\x00-\x7F]/g, "").trim();

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + cleanKey
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.7,
        messages: [
          { role: "system", content: `Write short catchy lyrics in language code: ${lang}. Output ONLY lyrics.` }, 
          { role: "user", content: promptText }
        ]
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0].message.content) {
      const lyrics = data.choices[0].message.content.trim();
      document.getElementById('textInput').value = lyrics;
      hideStatus();
      
      isContinuousMode = false;
      speakText(lyrics, lang);
      saveToHistory(promptText);

    } else if (data.error) {
      hideStatus();
      alert("Groq Error: " + data.error.message);
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហា៖ " + error.message); 
  }
}

// --- ៥. គ្រប់គ្រងប្រវត្តិ និង បញ្ជាសំឡេង ---
function saveToHistory(title) {
  let history = JSON.parse(localStorage.getItem('suno_song_history')) || [];
  history.unshift({ title: title || "បទចម្រៀង AI", date: new Date().toLocaleTimeString() });
  if (history.length > 15) history.pop();
  localStorage.setItem('suno_song_history', JSON.stringify(history));
  loadSongHistory();
}

function loadSongHistory() {
  const historyList = document.getElementById('historyList');
  if (!historyList) return;
  let history = JSON.parse(localStorage.getItem('suno_song_history')) || [];
  if (history.length === 0) { 
    historyList.innerHTML = '<p style="font-size: 0.85em; color: #888;">មិនទាន់មានប្រវត្តិ</p>'; 
    return; 
  }
  historyList.innerHTML = '';
  history.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `<span>🎵 ${item.title}</span>`;
    historyList.appendChild(div);
  });
}

function clearHistory() { 
  localStorage.removeItem('suno_song_history'); 
  loadSongHistory(); 
}

function playAudio() {
  const text = document.getElementById('textInput').value.trim();
  const lang = document.getElementById('langSelect').value;
  if (!text) {
    alert("សូមបញ្ចូលអត្ថបទដើម្បីចាក់សំឡេង!");
    return;
  }
  isContinuousMode = false;
  speakText(text, lang);
}

function stopAudio() { 
  isContinuousMode = false;
  if (typeof responsiveVoice !== 'undefined') {
    responsiveVoice.cancel();
  }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
}

function clearAll() { 
  stopAudio(); 
  document.getElementById('textInput').value = ''; 
}

function showStatus(msg) { 
  const statusBox = document.getElementById('statusBox'); 
  if (statusBox) { 
    statusBox.style.display = 'block'; 
    document.getElementById('statusText').innerText = msg; 
  } 
}

function hideStatus() { 
  const statusBox = document.getElementById('statusBox'); 
  if (statusBox) statusBox.style.display = 'none'; 
}
</script>
</body>
  </html>
