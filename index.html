<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant (Khmer)</title>

  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 15px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
    h2 {
      text-align: center;
      color: #10b981;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    .lang-container {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lang-box {
      flex: 1;
    }
    .lang-box label {
      display: block;
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 0.95em;
      font-family: inherit;
    }
    select {
      margin-bottom: 10px;
    }

    .box-label {
      font-size: 0.85em;
      color: #34d399;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    textarea {
      height: 95px;
      resize: vertical;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #outputText {
      background-color: #090d16;
      border-color: #059669;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 5px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.85em;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn-ask { background-color: #059669; }
    .btn-translate { background-color: #2563eb; }
    .btn-voice { background-color: #d97706; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; grid-column: span 3; }

    button:active { transform: scale(0.96); }

    #statusBox {
      display: none;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>⚡ Groq AI Assistant (Khmer)</h2>

  <div class="lang-container">
    <div class="lang-box">
      <label for="srcLangSelect">🗣️ ភាសាអ្នកនិយាយ/វាយ៖</label>
      <select id="srcLangSelect">
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en">🇺🇸 English (US)</option>
        <option value="fr">🇫🇷 Français (French)</option>
      </select>
    </div>

    <div class="lang-box">
      <label for="targetLangSelect">🌐 ភាសាចង់បកប្រែទៅ៖</label>
      <select id="targetLangSelect">
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en">🇺🇸 English (US)</option>
        <option value="fr">🇫🇷 Français (French)</option>
      </select>
    </div>
  </div>

  <div class="box-label">
    <span>✏️ អត្ថបទ ឬ សំឡេងរបស់អ្នក៖</span>
  </div>
  <textarea id="inputText" placeholder="វាយអក្សរ ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div class="box-label">
    <span>🤖 ចម្លើយពី Groq AI / លទ្ធផល៖</span>
  </div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលឆ្លើយតបនឹងបង្ហាញយ៉ាងលឿននៅទីនេះ..."></textarea>

  <div id="statusBox">
    <span id="statusText">...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askGroqAI()">🚀 សួរ Groq AI</button>
    <button class="btn-translate" onclick="translateGroqText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
  </div>
</div>

<script>
// 🔑 ដាក់ Groq API Key របស់អ្នកនៅទីនេះ (ចាប់ផ្តើមដោយ gsk_...)
const GROQ_API_KEY = "gsk_សូមដាក់GroqApiKeyរបស់អ្នកនៅទីនេះ"; 

let recognition = null;
let isListening = false;

document.addEventListener('DOMContentLoaded', () => {
  initSpeechRecognition();
});

function initSpeechRecognition() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() { 
      isListening = true; 
      showStatus("🎤 កំពុងស្ដាប់សំឡេងរបស់អ្នក..."); 
    };

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      document.getElementById('inputText').value = transcript;
      hideStatus();
      askGroqAI(); 
    };

    recognition.onerror = function(event) { 
      hideStatus(); 
      isListening = false; 
    };

    recognition.onend = function() { 
      isListening = false; 
    };
  }
}

function startVoiceInput() {
  if (!recognition) { 
    alert("Browser របស់អ្នកមិនគាំទ្រមុខងារចាប់សំឡេងទេ!"); 
    return; 
  }
  if (isListening) { 
    recognition.stop(); 
    return; 
  }
  const lang = document.getElementById('srcLangSelect').value;
  recognition.lang = lang === 'km' ? 'km-KH' : (lang === 'en' ? 'en-US' : lang);
  stopAudio();
  recognition.start();
}

async function askGroqAI() {
  const promptText = document.getElementById('inputText').value.trim();
  const srcLang = document.getElementById('srcLangSelect').value;

  if (!promptText) { 
    alert("សូមបញ្ចូលសំណួរក្នុងប្រអប់ខាងលើជាមុនសិន!"); 
    return; 
  }

  stopAudio();
  showStatus("⚡ Groq កំពុងឆ្លើយតបយ៉ាងលឿន...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${GROQ_API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile", // ម៉ូឌែលលឿន និងឆ្លាតវៃបំផុតរបស់ Groq
        messages: [
          {
            role: "system",
            content: "អ្នកគឺជាជំនួយការ AI ដ៏ឈ្លាសវៃ។ សូមឆ្លើយតបមកវិញជាភាសាខ្មែរឱ្យបានច្បាស់លាស់ ត្រឹមត្រូវតាមវេយ្យាករណ៍ រស់រវើក ធម្មជាតិ និងងាយយល់បំផុត។"
          },
          {
            role: "user",
            content: promptText
          }
        ],
        temperature: 0.7
      })
    });

    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      const aiReply = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = aiReply;
      hideStatus();
      speakText(aiReply, 'km');
    } else {
      hideStatus();
      alert("មិនអាចទទួលបានចម្លើយពី Groq ទេ! សូមពិនិត្យ API Key។");
    }
  } catch (error) { 
    hideStatus(); 
    alert("មានបញ្ហា៖ " + error.message); 
  }
}

async function translateGroqText() {
  const promptText = document.getElementById('inputText').value.trim();
  const targetLang = document.getElementById('targetLangSelect').value;

  if (!promptText) { 
    alert("សូមបញ្ចូលអត្ថបទដើម្បីបកប្រែ!"); 
    return; 
  }

  showStatus("🌐 Groq កំពុងបកប្រែយ៉ាងច្បាស់...");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${GROQ_API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "system",
            content: `អ្នកគឺជាអ្នកបកប្រែជំនាញ។ សូមបកប្រែអត្ថបទខាងក្រោមទៅជាភាសា ${targetLang === 'km' ? 'ខ្មែរ (Khmer)' : (targetLang === 'en' ? 'អង់គ្លេស (English)' : 'បារាំង (French)')} ឱ្យបានត្រឹមត្រូវ សំដីពីរោះ និងធម្មជាតិបំផុត។ បង្ហាញតែអត្ថបទបកប្រែសុទ្ធសាធ។`
          },
          {
            role: "user",
            content: promptText
          }
        ],
        temperature: 0.3
      })
    });

    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      const translated = data.choices[0].message.content.trim();
      document.getElementById('outputText').value = translated;
      hideStatus();
      speakText(translated, targetLang);
    } else {
      hideStatus();
      alert("កំហុសក្នុងការបកប្រែ!");
    }
  } catch (error) {
    hideStatus();
    alert("មានបញ្ហា៖ " + error.message);
  }
}

function speakText(text, langCode) {
  stopAudio();
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langCode === 'km' ? 'km-KH' : (langCode === 'en' ? 'en-US' : 'fr-FR');
    window.speechSynthesis.speak(utterance);
  }
}

function playAudio() {
  const text = document.getElementById('outputText').value;
  const lang = document.getElementById('targetLangSelect').value;
  if (text) speakText(text, lang);
}

function stopAudio() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
}

function clearAll() {
  stopAudio();
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').value = '';
}

function showStatus(msg) {
  const statusBox = document.getElementById('statusBox');
  statusBox.style.display = 'block';
  document.getElementById('statusText').innerText = msg;
}

function hideStatus() {
  document.getElementById('statusBox').style.display = 'none';
}
</script>
</body>
      </html>
