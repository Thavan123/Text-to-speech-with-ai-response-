<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Assistant & Translator - ឃួន ថាវ៉ាន់</title>

  <style>
    body {
      font-family: 'Kantumruy Pro', sans-serif, Arial;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 15px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    .lang-container {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lang-box {
      flex: 1;
    }
    .lang-box label {
      display: block;
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
      font-size: 0.95em;
      font-family: inherit;
    }
    select {
      margin-bottom: 10px;
    }

    .box-label {
      font-size: 0.85em;
      color: #38bdf8;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    textarea {
      height: 90px;
      resize: vertical;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #outputText {
      background-color: #090d16;
      border-color: #0284c7;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button, .file-upload-btn {
      padding: 10px 5px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.85em;
      transition: 0.2s;
      font-family: inherit;
      text-align: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }
    .btn-ask { background-color: #0284c7; }
    .btn-translate { background-color: #2563eb; }
    .btn-voice { background-color: #d97706; }
    .btn-camera { background-color: #0d9488; }
    .btn-live { background-color: #e11d48; }
    .btn-music { background-color: #9333ea; }
    .btn-play { background-color: #16a34a; }
    .btn-stop { background-color: #dc2626; }
    .btn-clear { background-color: #475569; grid-column: span 3; }

    button:active, .file-upload-btn:active { transform: scale(0.96); }

    #statusBox {
      display: none;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .preview-img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
      border: 1px solid #38bdf8;
    }
    .history-box {
      margin-top: 15px;
      border-top: 1px solid #334155;
      padding-top: 10px;
    }
    .history-item {
      background: #0f172a;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 0.8em;
    }

    /* 🌟 ផ្ទាំងស្វាគមន៍ */
    .welcome-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease;
    }
    .modal-content {
      background: #1e293b;
      padding: 30px 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 360px;
      width: 85%;
      border: 1px solid #38bdf8;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
    }
    .modal-content h3 {
      color: #38bdf8;
      margin-top: 0;
      font-size: 1.4em;
    }
    .modal-content p {
      color: #cbd5e1;
      font-size: 0.95em;
      line-height: 1.6;
    }
    .creator-name {
      color: #38bdf8;
      font-size: 1.2em;
      font-weight: bold;
    }
    .btn-enter {
      background: linear-gradient(135deg, #0284c7, #9333ea);
      color: white;
      padding: 12px 20px;
      font-size: 1em;
      border-radius: 25px;
      margin-top: 15px;
      width: 100%;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }
    #countdownDisplay {
      font-size: 1.8em;
      color: #38bdf8;
      font-weight: bold;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<!-- 🎵 តន្ត្រីផ្ទៃខាងក្រោយ -->
<audio id="bgMusic" preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- ✨ ផ្ទាំងស្វាគមន៍ -->
<div id="welcomeModal" class="welcome-modal">
  <div class="modal-content">
    <h3>សូមស្វាគមន៍! 👋</h3>
    <p>វេបសាយនេះបង្កើតឡើងដោយ៖<br><span class="creator-name">លោក ឃួន ថាវ៉ាន់</span></p>
    <p style="font-size: 0.85em; color: #94a3b8;">Groq AI & Voice/Camera Assistant</p>
    
    <button id="enterBtn" class="btn-enter" onclick="startCountdownAndMusic()">🚀 ចូលប្រើប្រាស់វេបសាយ</button>
    <div id="countdownDisplay">3</div>
  </div>
</div>

<div class="container">
  <h2>⚡ Groq AI Assistant & Camera</h2>

  <div class="lang-container">
    <div class="lang-box">
      <label for="srcLangSelect">🗣️ ភាសាអ្នកនិយាយ៖</label>
      <select id="srcLangSelect">
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="en">🇺🇸 English (US)</option>
        <option value="fr">🇫🇷 Français (French)</option>
        <option value="zh">🇨🇳 中文 (Chinese)</option>
        <option value="th">🇹🇭 ភាសាថៃ (Thai)</option>
      </select>
    </div>

    <div class="lang-box">
      <label for="targetLangSelect">🌐 ភាសាបកប្រែទៅ៖</label>
      <select id="targetLangSelect">
        <option value="en">🇺🇸 English (US)</option>
        <option value="km">🇰🇭 ភាសាខ្មែរ (Khmer)</option>
        <option value="fr">🇫🇷 Français (French)</option>
        <option value="zh">🇨🇳 中文 (Chinese)</option>
        <option value="th">🇹🇭 ភាសាថៃ (Thai)</option>
      </select>
    </div>
  </div>

  <div class="box-label">
    <span>✏️ អត្ថបទ សំឡេង ឬ រូបភាពរបស់អ្នក៖</span>
  </div>
  
  <!-- 📷 ប្រអប់បង្ហាញរូបភាពដែលបានថត -->
  <img id="imagePreview" class="preview-img" alt="Uploaded Image Preview">
  
  <textarea id="inputText" placeholder="វាយអក្សរ, ថតរូប ឬចុចប៊ូតុង 🎤 និយាយ..."></textarea>

  <div class="box-label">
    <span>🤖 ចម្លើយ AI / លទ្ធផល៖</span>
  </div>
  <textarea id="outputText" readonly placeholder="លទ្ធផលឆ្លើយតបនឹងបង្ហាញនៅទីនេះ..."></textarea>

  <div id="statusBox">
    <span id="statusText">...</span>
  </div>

  <div class="button-grid">
    <button class="btn-ask" onclick="askGroqAI()">✨ សួរ AI</button>
    <button class="btn-translate" onclick="translateGroqText()">🌐 បកប្រែ</button>
    <button class="btn-voice" onclick="startVoiceInput()">🎤 និយាយ</button>
    
    <!-- 📷 ប៊ូតុងថតរូបពីកាមេរ៉ា ឬ Upload -->
    <label class="file-upload-btn btn-camera">
      📸 ថតរូប
      <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
    </label>

    <!-- 🔴 ប៊ូតុងនិយាយឡាយផ្ទាល់ជាប់ជាមួយ AI -->
    <button class="btn-live" id="liveBtn" onclick="toggleLiveChat()">🔴 និយាយផ្ទាល់</button>
    
    <button class="btn-music" onclick="generateGroqSong()">🎵 តែងចម្រៀង</button>
    <button class="btn-play" onclick="playAudio()">▶️ ចាក់សំឡេង</button>
    <button class="btn-stop" onclick="stopAudio()">⏹️ បញ្ឈប់</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
  </div>

  <div class="history-box">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size:0.85em;">📜 ប្រវត្តិបទចម្រៀង AI</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; padding:0; cursor:pointer; font-size:0.8em;">🗑️ លុបប្រវត្តិ</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
  const encodedGroqKey = "Z3NrXzJsZmY0TXk5NjlGcUVnMzFiUGdrV0dkeWIzRllEZkt0bXhNelZKcFMyT2JMempqcHFZQzg=";
  function getGroqApiKey() { return atob(encodedGroqKey).trim(); }

  let recognition = null;
  let isListening = false;
  let isLiveMode = false;
  let audioPlayer = new Audio();
  const bgMusic = document.getElementById('bgMusic');
  let base64Image = "";

  document.addEventListener('DOMContentLoaded', () => {
    loadSongHistory();
    initSpeechRecognition();
  });

  // 🌟 រាប់ថយក្រោយ ៣ វិនាទី និងបើកភ្លេង ១០ វិនាទី
  function startCountdownAndMusic() {
    const enterBtn = document.getElementById('enterBtn');
    const countdownDisplay = document.getElementById('countdownDisplay');
    
    enterBtn.style.display = 'none';
    countdownDisplay.style.display = 'block';

    if (bgMusic) {
      bgMusic.volume = 0.4;
      bgMusic.play().catch(err => console.log("Audio play error:", err));

      setTimeout(() => {
        let fadeInterval = setInterval(() => {
          if (bgMusic.volume > 0.05) {
            bgMusic.volume -= 0.05;
          } else {
            bgMusic.pause();
            bgMusic.currentTime = 0;
            clearInterval(fadeInterval);
          }
        }, 150);
      }, 10000);
    }

    let count = 3;
    countdownDisplay.innerText = count;

    let timer = setInterval(() => {
      count--;
      if (count > 0) {
        countdownDisplay.innerText = count;
      } else {
        clearInterval(timer);
        countdownDisplay.innerText = "🚀!";
        const modal = document.getElementById('welcomeModal');
        modal.style.opacity = '0';
        setTimeout(() => { modal.style.display = 'none'; }, 1000);
      }
    }, 1000);
  }

  // 📷 មុខងារទាញយករូបភាព និងแปลงជា Base64
  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        base64Image = e.target.result;
        const preview = document.getElementById('imagePreview');
        preview.src = base64Image;
        preview.style.display = 'block';
        document.getElementById('inputText.value') = "";
        document.getElementById('inputText').placeholder = "រូបភាពត្រូវបានបញ្ចូល! សូមសរសេរសំណួរអំពីវេទមន្តរូបភាពនេះ ឬចុច 'សួរ AI'";
      };
      reader.readAsDataURL(file);
    }
  }

  // 🎤 មុខងារស្តាប់សំឡេងធម្មតា
  function initSpeechRecognition() {
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = function() { 
        isListening = true; 
        showStatus("🎤 កំពុងស្ដាប់សំឡេងរបស់អ្នក..."); 
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById('inputText').value = transcript;
        hideStatus();
        if (isLiveMode) {
          askGroqAI(); // បើកំពុងឡាយ ពេលនិយាយចប់វាបញ្ជូនទៅ AI ភ្លាម
        }
      };

      recognition.onerror = function() { hideStatus(); isListening = false; };
      recognition.onend = function() { 
        isListening = false; 
        if (isLiveMode) {
          setTimeout(() => { recognition.start(); }, 500); // ឡាយបន្តស្ដាប់ទៀតស្វ័យប្រវត្តិ
        }
      };
    }
  }

  function startVoiceInput() {
    if (!recognition) { alert("Browser មិនគាំទ្រសំឡេងទេ!"); return; }
    isLiveMode = false;
    document.getElementById('liveBtn').style.backgroundColor = '#e11d48';
    if (isListening) { recognition.stop(); return; }
    recognition.lang = document.getElementById('srcLangSelect').value === 'km' ? 'km-KH' : 'en-US';
    stopAudio();
    recognition.start();
  }

  // 🔴 មុខងារនិយាយផ្ទាល់ជាប់គ្នា (Live Voice Chat with AI)
  function toggleLiveChat() {
    if (!recognition) { alert("Browser មិនគាំទ្រទេ!"); return; }
    isLiveMode = !isLiveMode;
    const btn = document.getElementById('liveBtn');
    if (isLiveMode) {
      btn.style.backgroundColor = '#16a34a'; // ប្ដូរជាពណ៌បៃតងពេលបើកឡាយ
      showStatus("🔴 កំពុងឡាយផ្ទាល់ជាមួយ AI (និយាយបានជានិច្ច)...");
      recognition.lang = 'km-KH';
      recognition.start();
    } else {
      btn.style.backgroundColor = '#e11d48';
      hideStatus();
      recognition.stop();
    }
  }

  // ✨ សួរ AI (គាំទ្រទាំងអត្ថបទ និងរូបភាពថតពីកាមេរ៉ា)
  async function askGroqAI() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim() || "សូមជួយអាន និងពន្យល់អត្ថបទ ឬរូបភាពនេះឱ្យបានលម្អិត។";
    const srcLang = document.getElementById('srcLangSelect').value;

    stopAudio();
    showStatus("⚡ AI កំពុងវិភាគ...");

    try {
      // បើមានរូបភាពថត យើងអាចផ្ញើអមជាមួយសំណួរបាន
      let messagesContent = promptText;
      
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: "អ្នកគឺជាជំនួយការ AI ដ៏ឈ្លាសវៃ។ សូមឆ្លើយតបជាភាសាខ្មែរឱ្យបានពីរោះ និងច្បាស់លាស់។" },
            { role: "user", content: messagesContent }
          ],
          temperature: 0.7
        })
      });

      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        const aiReply = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = aiReply;
        hideStatus();
        speakText(aiReply, srcLang);
      } else {
        hideStatus();
        alert("Error: " + (data.error?.message || "Invalid response"));
      }
    } catch (error) { 
      hideStatus(); 
      alert("Network error: " + error.message); 
    }
  }

  async function translateGroqText() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    const targetLang = document.getElementById('targetLangSelect').value;
    if (!promptText) { alert("សូមបញ្ចូលអត្ថបទដើម្បីបកប្រែ!"); return; }

    showStatus("🌐 កំពុងបកប្រែ...");
    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: `Translate accurately into language code "${targetLang}". Return ONLY translated text.` },
            { role: "user", content: promptText }
          ],
          temperature: 0.3
        })
      });
      const data = await response.json();
      if (data.choices) {
        const translated = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = translated;
        hideStatus();
        speakText(translated, targetLang);
      }
    } catch (error) { hideStatus(); alert("Error: " + error.message); }
  }

  async function generateGroqSong() {
    const apiKey = getGroqApiKey();
    const promptText = document.getElementById('inputText').value.trim();
    const lang = document.getElementById('srcLangSelect').value;
    if (!promptText) { alert("សូមបញ្ចូលប្រធានបទចម្រៀង!"); return; }

    showStatus("🎵 កំពុងតែងចម្រៀង...");
    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: "Write poetic song lyrics based on the topic. Return ONLY lyrics." },
            { role: "user", content: promptText }
          ],
          temperature: 0.8
        })
      });
      const data = await response.json();
      if (data.choices) {
        const lyrics = data.choices[0].message.content.trim();
        document.getElementById('outputText').value = lyrics;
        hideStatus();
        speakText(lyrics, lang);
        saveToHistory(promptText);
      }
    } catch (error) { hideStatus(); alert("Error: " + error.message); }
  }

  function speakText(text, langCode) {
    stopAudio();
    if (!text) return;
    const cleanText = encodeURIComponent(text.substring(0, 300));
    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${cleanText}&tl=${langCode}&client=tw-ob`;
    audioPlayer.src = ttsUrl;
    audioPlayer.play().catch(() => {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langCode === 'km' ? 'km-KH' : langCode;
        window.speechSynthesis.speak(utterance);
      }
    });
  }

  function playAudio() {
    const text = document.getElementById('outputText').value.trim() || document.getElementById('inputText').value.trim();
    const lang = document.getElementById('targetLangSelect').value;
    if (!text) { alert("មិនមានអត្ថបទ!"); return; }
    speakText(text, lang);
  }

  function stopAudio() {
    if (audioPlayer) { audioPlayer.pause(); audioPlayer.currentTime = 0; }
    if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); }
  }

  function clearAll() {
    stopAudio();
    isLiveMode = false;
    document.getElementById('liveBtn').style.backgroundColor = '#e11d48';
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    base64Image = "";
  }

  function saveToHistory(title) {
    let history = JSON.parse(localStorage.getItem('groq_song_history')) || [];
    history.unshift({ title: title || "បទចម្រៀង AI", date: new Date().toLocaleTimeString() });
    if (history.length > 15) history.pop();
    localStorage.setItem('groq_song_history', JSON.stringify(history));
    loadSongHistory();
  }

  function loadSongHistory() {
    const historyList = document.getElementById('historyList');
    if (!historyList) return;
    let history = JSON.parse(localStorage.getItem('groq_song_history')) || [];
    if (history.length === 0) { historyList.innerHTML = '<p style="font-size: 0.8em; color: #888;">មិនទាន់មានប្រវត្តិ</p>'; return; }
    historyList.innerHTML = '';
    history.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<span>🎵 ${item.title}</span>`;
      historyList.appendChild(div);
    });
  }

  function clearHistory() { localStorage.removeItem('groq_song_history'); loadSongHistory(); }
  function showStatus(msg) { document.getElementById('statusBox').style.display = 'block'; document.getElementById('statusText').innerText = msg; }
  function hideStatus() { document.getElementById('statusBox').style.display = 'none'; }
</script>
</body>
